<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#x4e8c;&#x7ef4;&#x7801;&#x751f;&#x6210;&#x5668;</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
:root {
  --bg: #0d0d1a;
  --card: #15152a;
  --border: #2a2a45;
  --primary: #6c5ce7;
  --primary-glow: rgba(108,92,231,0.3);
  --text: #e0e0e0;
  --muted: #888;
  --danger: #e74c3c;
  --success: #2ecc71;
  --radius: 14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 16px;
}
.container { max-width: 540px; width: 100%; }

/* Header */
.header { text-align: center; margin-bottom: 28px; }
.header h1 {
  font-size: 2em;
  font-weight: 700;
  background: linear-gradient(135deg, #a78bfa, #6c5ce7, #4f46e5);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
}
.header .sub { color: var(--muted); font-size: 0.85em; margin-top: 6px; }

/* Tabs */
.tabs {
  display: flex;
  background: var(--card);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 11px 0;
  text-align: center;
  cursor: pointer;
  border-radius: 11px;
  font-size: 0.95em;
  font-weight: 500;
  transition: all 0.25s;
  background: transparent;
  color: var(--muted);
  border: none;
  font-family: inherit;
}
.tab.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 4px 15px var(--primary-glow);
}

/* Card */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
}
.card label {
  display: block;
  font-size: 0.88em;
  color: #bbb;
  margin-bottom: 8px;
  font-weight: 500;
}
textarea, input[type="text"], input[type="url"], input[type="password"] {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #0d0d1a;
  color: var(--text);
  font-size: 0.95em;
  font-family: inherit;
  transition: border-color 0.2s;
}
textarea { min-height: 110px; resize: vertical; }
textarea:focus, input:focus { outline: none; border-color: var(--primary); }
input::placeholder, textarea::placeholder { color: #555; }

/* File Upload */
.file-upload-area {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 28px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  background: #0d0d1a;
}
.file-upload-area:hover { border-color: var(--primary); background: #12122a; }
.file-upload-area .upload-icon { font-size: 2.2em; margin-bottom: 8px; }
.file-upload-area .hint { color: var(--muted); font-size: 0.82em; margin-top: 6px; }
.file-upload-area input[type="file"] { display: none; }
.preview-img {
  max-width: 220px;
  max-height: 130px;
  border-radius: 10px;
  margin: 12px auto 0;
  display: block;
  border: 1px solid var(--border);
}
.image-info {
  text-align: center;
  font-size: 0.82em;
  color: var(--muted);
  margin-top: 8px;
}

/* Settings Cards */
.settings-section { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.setting-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.3s;
}
.setting-card.active { border-color: var(--primary); }
.setting-card.locked { opacity: 0.6; }
.setting-header {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  gap: 14px;
  transition: background 0.2s;
}
.setting-card.locked .setting-header { cursor: not-allowed; }
.setting-header:hover { background: rgba(108,92,231,0.06); }
.setting-card.locked .setting-header:hover { background: transparent; }
.setting-icon { font-size: 1.5em; flex-shrink: 0; line-height: 1; }
.setting-info { flex: 1; min-width: 0; }
.setting-title { font-size: 0.95em; font-weight: 600; color: #ddd; }
.setting-desc { font-size: 0.78em; color: var(--muted); margin-top: 2px; transition: color 0.3s; }
.setting-card.active .setting-desc { color: var(--primary); }
.setting-switch {
  position: relative;
  width: 52px;
  height: 30px;
  background: #3a3a55;
  border-radius: 15px;
  transition: background 0.3s;
  flex-shrink: 0;
}
.setting-switch::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 24px; height: 24px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.setting-switch.on { background: var(--primary); }
.setting-switch.on::after { transform: translateX(22px); }
.setting-switch.locked { opacity: 0.5; }
.setting-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, padding 0.35s ease;
  padding: 0 20px;
}
.setting-body.open { max-height: 80px; padding: 0 20px 16px; }
.expire-select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #0d0d1a;
  color: var(--text);
  font-size: 0.9em;
  font-family: inherit;
  cursor: pointer;
}
.expire-select:focus { outline: none; border-color: var(--primary); }
.setting-body input[type="password"] {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #0d0d1a;
  color: var(--text);
  font-size: 0.9em;
  font-family: inherit;
}
.setting-body input[type="password"]:focus { outline: none; border-color: var(--primary); }

/* Generate Btn */
.generate-btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #7c6ff7, #5b4dcd);
  color: #fff;
  font-size: 1.05em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s;
  letter-spacing: 1px;
  font-family: inherit;
}
.generate-btn:hover { background: linear-gradient(135deg, #8b7df8, #6c5ee7); transform: translateY(-1px); box-shadow: 0 8px 25px var(--primary-glow); }
.generate-btn:active { transform: translateY(0); }
.generate-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

/* QR Result */
.qr-result { text-align: center; margin-top: 24px; display: none; }
.qr-result.show { display: block; animation: fadeIn 0.4s ease; }
.qr-result .qr-wrapper {
  display: inline-block;
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 8px 30px rgba(108,92,231,0.25);
}
.qr-result .qr-meta { margin-top: 14px; color: var(--muted); font-size: 0.85em; }
.qr-result .qr-meta span { display: block; margin-top: 4px; }
.download-btn {
  display: inline-block;
  margin-top: 14px;
  padding: 10px 28px;
  border: 1px solid var(--primary);
  border-radius: 10px;
  background: transparent;
  color: var(--primary);
  font-size: 0.92em;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.download-btn:hover { background: var(--primary); color: #fff; }

/* Status */
.status { font-size: 0.84em; margin-top: 8px; }
.status.success { color: var(--success); }
.status.error { color: var(--danger); }
.status.info { color: #a78bfa; }

footer {
  text-align: center;
  color: #444;
  font-size: 0.78em;
  margin-top: 30px;
  padding-bottom: 20px;
}

/* ========== &#x5c55;&#x793a;&#x9875;&#x9762;&#x6837;&#x5f0f; ========== */
body.view-page {
  display: flex;
  align-items: center;
  justify-content: center;
}
.view-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  max-width: 600px;
  width: 90%;
  text-align: center;
}
.view-card h2 { font-size: 1.3em; margin-bottom: 16px; color: #a78bfa; }
.view-card .content-area {
  background: #0d0d1a;
  border-radius: 10px;
  padding: 20px;
  text-align: left;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.8;
  max-height: 65vh;
  overflow-y: auto;
  font-size: 0.95em;
}
.view-card .content-area img { max-width: 100%; border-radius: 8px; }
.view-card .expired-msg { color: var(--danger); font-size: 1.1em; padding: 30px 0; }
.view-card .pwd-hint { color: var(--muted); font-size: 0.85em; margin-top: 10px; }
.view-card .loading-spinner {
  display: inline-block;
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 16px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.view-card footer { margin-top: 18px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Responsive */
@media (max-width: 480px) {
  .options-row { flex-direction: column; }
  .header h1 { font-size: 1.5em; }
}
</style>
</head>
<body>
<div class="container" id="generator">
  <div class="header">
    <h1>&#x4e8c;&#x7ef4;&#x7801;&#x751f;&#x6210;&#x5668;</h1>
    <div class="sub">&#x6587;&#x5b57; & &#x56fe;&#x7247; &middot; &#x5bc6;&#x7801;&#x4fdd;&#x62a4; &middot; &#x65f6;&#x6548;&#x63a7;&#x5236;</div>
  </div>

  <!-- &#x6a21;&#x5f0f;&#x5207;&#x6362; -->
  <div class="tabs">
    <button class="tab active" data-mode="text">&#x6587;&#x5b57;</button>
    <button class="tab" data-mode="image">&#x56fe;&#x7247;</button>
  </div>

  <!-- &#x6587;&#x5b57;&#x6a21;&#x5f0f; -->
  <div class="card mode-panel" id="panel-text">
    <label>&#x8f93;&#x5165;&#x6587;&#x5b57;&#x5185;&#x5bb9;</label>
    <textarea id="textInput" placeholder="&#x5728;&#x8fd9;&#x91cc;&#x8f93;&#x5165;&#x60a8;&#x8981;&#x5206;&#x4eab;&#x7684;&#x6587;&#x5b57;&#xff0c;&#x626b;&#x7801;&#x540e;&#x5c31;&#x80fd;&#x770b;&#x5230;..."></textarea>
  </div>

  <!-- &#x56fe;&#x7247;&#x6a21;&#x5f0f; -->
  <div class="card mode-panel" id="panel-image" style="display:none">
    <label>&#x9009;&#x62e9;&#x56fe;&#x7247;</label>
    <div class="file-upload-area" id="uploadArea">
      <div class="upload-icon">&#x1F5BC;</div>
      <div>&#x70b9;&#x51fb;&#x4e0a;&#x4f20;&#x56fe;&#x7247;</div>
      <div class="hint">&#x652f;&#x6301; JPG / PNG / GIF / WebP&#xff0c;&#x6700;&#x5927; 10MB</div>
      <input type="file" id="imageInput" accept="image/*">
    </div>
    <div id="uploadStatus" class="status" style="margin-top:10px;display:none"></div>
    <img id="previewImg" class="preview-img" style="display:none">
    <div id="imageInfo" class="image-info" style="display:none"></div>
  </div>

  <!-- &#x53ef;&#x9009;&#x8bbe;&#x7f6e; -->
  <div class="settings-section">
    <!-- &#x6709;&#x6548;&#x671f; -->
    <div class="setting-card" id="expireCard">
      <div class="setting-header" id="expireHeader">
        <div class="setting-icon">&#x23F1;</div>
        <div class="setting-info">
          <div class="setting-title">&#x6709;&#x6548;&#x671f;</div>
          <div class="setting-desc" id="expireDesc">&#x5173;&#x95ed;</div>
        </div>
        <div class="setting-switch" id="expireSwitch"></div>
      </div>
      <div class="setting-body" id="expireBody">
        <select class="expire-select" id="expireDuration">
          <option value="1">1 &#x5c0f;&#x65f6;&#x540e;&#x8fc7;&#x671f;</option>
          <option value="6">6 &#x5c0f;&#x65f6;&#x540e;&#x8fc7;&#x671f;</option>
          <option value="24" selected>24 &#x5c0f;&#x65f6;&#x540e;&#x8fc7;&#x671f;</option>
          <option value="72">3 &#x5929;&#x540e;&#x8fc7;&#x671f;</option>
          <option value="168">7 &#x5929;&#x540e;&#x8fc7;&#x671f;</option>
          <option value="720">30 &#x5929;&#x540e;&#x8fc7;&#x671f;</option>
        </select>
      </div>
    </div>

    <!-- &#x8bbf;&#x95ee;&#x5bc6;&#x7801; -->
    <div class="setting-card" id="pwdCard">
      <div class="setting-header" id="pwdHeader">
        <div class="setting-icon">&#x1F512;</div>
        <div class="setting-info">
          <div class="setting-title">&#x8bbf;&#x95ee;&#x5bc6;&#x7801;</div>
          <div class="setting-desc" id="pwdDesc">&#x5173;&#x95ed;</div>
        </div>
        <div class="setting-switch" id="pwdSwitch"></div>
      </div>
      <div class="setting-body" id="pwdBody">
        <input type="password" id="pwdInput" placeholder="&#x8bbe;&#x7f6e; 4-20 &#x4f4d;&#x5bc6;&#x7801;" maxlength="20">
      </div>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn">&#x751f;&#x6210;&#x4e8c;&#x7ef4;&#x7801;</button>

  <div class="qr-result" id="qrResult">
    <div class="qr-wrapper">
      <div id="qrcode"></div>
    </div>
    <div id="expireHint" class="status success" style="display:none;margin-top:10px"></div>
    <div id="encryptHint" class="status info" style="display:none;margin-top:10px"></div>
    <button class="download-btn" id="downloadBtn" style="display:none;">&#x4e0b;&#x8f7d;&#x9ad8;&#x6e05;&#x4e8c;&#x7ef4;&#x7801; (PNG)</button>
  </div>

  <footer>&copy; Marvis &#x5de5;&#x5177;</footer>
</div>

<textarea id="encryptedDataArea" style="display:none"></textarea>

<script>
// ============ \u751f\u6210\u9875\u9762\u903b\u8f91 ============
let currentMode = 'text';
let uploadedImageData = null;     // ArrayBuffer \u2014 \u539f\u59cb\u56fe\u7247\u6570\u636e
let uploadedImageFile = null;     // File \u5f15\u7528\uff08\u9884\u89c8\u7528\uff09
let uploadedImageInfo = '';       // \u5c3a\u5bf8\u4fe1\u606f\u5b57\u7b26\u4e32
let uploadedPreviewUrl = null;    // \u9884\u89c8 Blob URL
let qrContentString = '';         // \u4e8c\u7ef4\u7801\u5b9e\u9645\u7f16\u7801\u7684\u5b57\u7b26\u4e32
let pendingEncryptedBase64 = '';  // \u52a0\u5bc6\u540e\u7684 base64 \u6570\u636e
let pendingEncFileName = '';      // \u52a0\u5bc6\u6587\u4ef6\u540d

// --- \u8bbe\u7f6e\u5361\u7247\u5f00\u5173 ---
let expireEnabled = false;
let pwdEnabled = false;
let pwdLockedByImageMode = false; // \u56fe\u7247\u6a21\u5f0f\u4e0b\u5bc6\u7801\u5f3a\u5236\u9501\u5b9a

function toggleSetting(type) {
  const card = document.getElementById(type + 'Card');
  const sw = document.getElementById(type + 'Switch');
  const body = document.getElementById(type + 'Body');
  const desc = document.getElementById(type + 'Desc');

  if (type === 'expire') {
    expireEnabled = !expireEnabled;
    sw.classList.toggle('on', expireEnabled);
    card.classList.toggle('active', expireEnabled);
    body.classList.toggle('open', expireEnabled);
    if (expireEnabled) {
      const dur = document.getElementById('expireDuration');
      const labels = { '1':'1\u5c0f\u65f6\u540e\u8fc7\u671f','6':'6\u5c0f\u65f6\u540e\u8fc7\u671f','24':'24\u5c0f\u65f6\u540e\u8fc7\u671f','72':'3\u5929\u540e\u8fc7\u671f','168':'7\u5929\u540e\u8fc7\u671f','720':'30\u5929\u540e\u8fc7\u671f' };
      desc.textContent = labels[dur.value] || '\u5df2\u542f\u7528';
    } else {
      desc.textContent = '\u5173\u95ed';
    }
  } else {
    // \u56fe\u7247\u6a21\u5f0f\u4e0b\u5bc6\u7801\u9501\u5b9a\uff0c\u4e0d\u5141\u8bb8\u5207\u6362
    if (pwdLockedByImageMode) return;
    pwdEnabled = !pwdEnabled;
    sw.classList.toggle('on', pwdEnabled);
    card.classList.toggle('active', pwdEnabled);
    body.classList.toggle('open', pwdEnabled);
    if (pwdEnabled) {
      desc.textContent = '\u5df2\u542f\u7528';
    } else {
      desc.textContent = '\u5173\u95ed';
      document.getElementById('pwdInput').value = '';
    }
  }
}

document.getElementById('expireHeader').addEventListener('click', () => toggleSetting('expire'));
document.getElementById('pwdHeader').addEventListener('click', () => toggleSetting('pwd'));

// \u6709\u6548\u671f\u4e0b\u62c9\u53d8\u5316\u65f6\u66f4\u65b0\u63cf\u8ff0
document.getElementById('expireDuration').addEventListener('change', function() {
  const labels = { '1':'1\u5c0f\u65f6\u540e\u8fc7\u671f','6':'6\u5c0f\u65f6\u540e\u8fc7\u671f','24':'24\u5c0f\u65f6\u540e\u8fc7\u671f','72':'3\u5929\u540e\u8fc7\u671f','168':'7\u5929\u540e\u8fc7\u671f','720':'30\u5929\u540e\u8fc7\u671f' };
  document.getElementById('expireDesc').textContent = labels[this.value];
});

// --- \u5f3a\u5236\u5f00\u542f\u5bc6\u7801\uff08\u56fe\u7247\u6a21\u5f0f\uff09 ---
function forceEnablePassword() {
  pwdLockedByImageMode = true;
  pwdEnabled = true;
  const card = document.getElementById('pwdCard');
  const sw = document.getElementById('pwdSwitch');
  const body = document.getElementById('pwdBody');
  const desc = document.getElementById('pwdDesc');
  card.classList.add('locked');
  sw.classList.add('on', 'locked');
  card.classList.add('active');
  body.classList.add('open');
  desc.textContent = '\u5df2\u542f\u7528\uff08\u56fe\u7247\u6a21\u5f0f\u5f3a\u5236\uff09';
}

function releasePassword() {
  pwdLockedByImageMode = false;
  const card = document.getElementById('pwdCard');
  const sw = document.getElementById('pwdSwitch');
  card.classList.remove('locked');
  sw.classList.remove('locked');
  // \u6062\u590d\u4e4b\u524d\u72b6\u6001\uff1a\u5982\u679c\u4e4b\u524d\u5c31\u662f\u5f00\u542f\u7684\u5219\u4fdd\u6301\uff0c\u5426\u5219\u5173\u95ed
  if (!pwdEnabled) {
    sw.classList.remove('on');
    card.classList.remove('active');
    document.getElementById('pwdBody').classList.remove('open');
    document.getElementById('pwdDesc').textContent = '\u5173\u95ed';
    document.getElementById('pwdInput').value = '';
  }
}

// --- \u6a21\u5f0f\u5207\u6362 ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMode = tab.dataset.mode;
    document.querySelectorAll('.mode-panel').forEach(p => p.style.display = 'none');
    document.getElementById('panel-' + currentMode).style.display = '';
    document.getElementById('qrResult').classList.remove('show');
    document.getElementById('downloadBtn').style.display = 'none';

    if (currentMode === 'image') {
      forceEnablePassword();
    } else {
      releasePassword();
    }
  });
});

// --- \u56fe\u7247\u4e0a\u4f20\u5904\u7406\uff08\u65e0\u538b\u7f29\uff0c\u76f4\u63a5\u8bfb ArrayBuffer\uff09 ---
document.getElementById('uploadArea').addEventListener('click', () => {
  document.getElementById('imageInput').click();
});

document.getElementById('imageInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  // \u6e05\u7406\u65e7\u9884\u89c8 URL
  if (uploadedPreviewUrl) {
    URL.revokeObjectURL(uploadedPreviewUrl);
    uploadedPreviewUrl = null;
  }

  const status = document.getElementById('uploadStatus');
  const infoDiv = document.getElementById('imageInfo');
  status.style.display = 'block';
  status.textContent = '\u8bfb\u53d6\u4e2d...';
  status.className = 'status';

  try {
    // \u8bfb\u53d6\u4e3a ArrayBuffer\uff08\u539f\u59cb\u6570\u636e\uff09
    const arrayBuffer = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    });

    uploadedImageData = arrayBuffer;
    uploadedImageFile = file;

    // \u9884\u89c8\uff1a\u7528 Blob URL \u663e\u793a\u539f\u56fe
    uploadedPreviewUrl = URL.createObjectURL(file);
    const preview = document.getElementById('previewImg');
    preview.src = uploadedPreviewUrl;
    preview.style.display = 'block';

    // \u663e\u793a\u539f\u56fe\u5c3a\u5bf8

// --- AES-256-GCM \u52a0\u5bc6 ---
async function encryptImage(password, arrayBuffer) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt']
  );
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, arrayBuffer);
  const result = new Uint8Array(16 + 12 + ciphertext.byteLength);
  result.set(salt, 0);
  result.set(iv, 16);
  result.set(new Uint8Array(ciphertext), 28);
  return result;
}

// --- AES-256-GCM \u89e3\u5bc6 ---
async function decryptImage(password, encryptedBuffer) {
  const salt = encryptedBuffer.slice(0, 16);
  const iv = encryptedBuffer.slice(16, 28);
  const ciphertext = encryptedBuffer.slice(28);
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
  return await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
}

// --- \u6784\u5efa payload ---
function buildPayload() {
  if (currentMode === 'text') {
    const payload = { mode: 'text' };
    payload.content = document.getElementById('textInput').value.trim();
    if (expireEnabled) {
      const hours = parseInt(document.getElementById('expireDuration').value);
      payload.expire = Date.now() + hours * 3600 * 1000;
    }
    if (pwdEnabled) {
      const pwd = document.getElementById('pwdInput').value.trim();
      if (!pwd || pwd.length < 4) return { error: '\u5bc6\u7801\u81f3\u5c11 4 \u4f4d' };
      payload.pwd = sha256(pwd);
    }
    return payload;
  } else {
    // \u56fe\u7247\u6a21\u5f0f\uff1apayload \u4ec5\u542b\u6587\u4ef6\u540d\u548c\u8fc7\u671f\u65f6\u95f4
    const payload = { mode: 'image', file: pendingEncFileName };
    if (expireEnabled) {
      const hours = parseInt(document.getElementById('expireDuration').value);
      payload.expire = Date.now() + hours * 3600 * 1000;
    }
    return payload;
  }
}

  downloadBtn.style.display = 'none';
  expireHint.style.display = 'none';
  encryptHint.style.display = 'none';
  pendingEncryptedBase64 = '';
  pendingEncFileName = '';

  if (currentMode === 'text') {
    const text = document.getElementById('textInput').value.trim();
    if (!text) {
      resultDiv.classList.add('show');
      qrContainer.innerHTML = '<span style="color:#e74c3c;font-size:0.9em">\u8bf7\u8f93\u5165\u6587\u5b57\u5185\u5bb9</span>';
      return;
    }
  } else {
    if (!uploadedImageData) {
      resultDiv.classList.add('show');
      qrContainer.innerHTML = '<span style="color:#e74c3c;font-size:0.9em">\u8bf7\u5148\u4e0a\u4f20\u56fe\u7247</span>';
      return;
    }
    // \u56fe\u7247\u6a21\u5f0f\uff1a\u6821\u9a8c\u5bc6\u7801
    const pwd = document.getElementById('pwdInput').value.trim();
    if (!pwd || pwd.length < 4) {
      resultDiv.classList.add('show');
      qrContainer.innerHTML = '<span style="color:#e74c3c;font-size:0.9em">\u56fe\u7247\u6a21\u5f0f\u9700\u8bbe\u7f6e\u5bc6\u7801\uff08\u81f3\u5c11 4 \u4f4d\uff09</span>';
      return;
    }

    // \u52a0\u5bc6\u56fe\u7247
    try {
      const encrypted = await encryptImage(pwd, uploadedImageData);
      // \u751f\u6210\u552f\u4e00\u6587\u4ef6\u540d
      pendingEncFileName = crypto.randomUUID() + '.enc';
      // \u8f6c base64 \u5b58\u50a8
      const bytes = new Uint8Array(encrypted);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      pendingEncryptedBase64 = btoa(binary);
      // \u5199\u5165\u9690\u85cf textarea
      document.getElementById('encryptedDataArea').value = pendingEncryptedBase64;

      encryptHint.textContent = '\u52a0\u5bc6\u6570\u636e\u5df2\u5c31\u7eea\uff0c\u52a0\u5bc6\u6587\u4ef6\u5c06\u81ea\u52a8\u4e0b\u8f7d\u3002\u8bf7\u5c06 .enc \u6587\u4ef6\u4e0a\u4f20\u81f3 GitHub \u4ed3\u5e93 images/ \u76ee\u5f55\u3002';
      encryptHint.style.display = 'block';
    } catch (err) {
      resultDiv.classList.add('show');
      qrContainer.innerHTML = '<span style="color:#e74c3c;font-size:0.9em">\u52a0\u5bc6\u5931\u8d25\uff1a' + err.message + '</span>';
      return;
    }
  }

  const payload = buildPayload();
  if (payload.error) {
    resultDiv.classList.add('show');
    qrContainer.innerHTML = '<span style="color:#e74c3c;font-size:0.9em">' + payload.error + '</span>';
    return;
  }

  const payloadJson = JSON.stringify(payload);
  const payloadBase64 = btoa(unescape(encodeURIComponent(payloadJson)));
  qrContentString = window.location.origin + window.location.pathname + '#d=' + payloadBase64;

  try {
    const qr = qrcode(0, 'L');
    qr.addData(qrContentString);
    qr.make();
    qrContainer.innerHTML = qr.createImgTag(4);
    resultDiv.classList.add('show');

    if (payload.expire) {
      const expireDate = new Date(payload.expire);
      expireHint.textContent = '\u6709\u6548\u671f\u81f3\uff1a' + expireDate.toLocaleString('zh-CN');
      expireHint.style.display = 'block';
    }

    downloadBtn.style.display = 'inline-block';

    // \u56fe\u7247\u6a21\u5f0f\uff1a\u81ea\u52a8\u89e6\u53d1\u4e0b\u8f7d\u52a0\u5bc6\u6587\u4ef6
    if (currentMode === 'image' && pendingEncryptedBase64) {
      const binaryStr = atob(pendingEncryptedBase64);
      const bytes = new Uint8Array(binaryStr.length);
      for (let i = 0; i < binaryStr.length; i++) {
        bytes[i] = binaryStr.charCodeAt(i);
      }
      const blob = new Blob([bytes], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = pendingEncFileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  } catch (err) {
    qrContainer.innerHTML = '<span style="color:#e74c3c;font-size:0.9em">\u751f\u6210\u5931\u8d25\uff1a' + err.message + '</span>';
    resultDiv.classList.add('show');
  }
});

// --- \u751f\u4ea7 512x512 \u9ad8\u6e05\u4e8c\u7ef4\u7801 Canvas ---
function renderHighResQR(data, size) {
  return new Promise((resolve) => {
    const qr = qrcode(0, 'L');
    qr.addData(data);
    qr.make();
    const moduleCount = qr.getModuleCount();
    const cellSize = Math.floor(size / moduleCount);
    const dataUrl = qr.createDataURL(cellSize, 0);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, size, size);
      ctx.drawImage(img, 0, 0, size, size);
      resolve(canvas);
    };
    img.src = dataUrl;
  });
}

// SHA-256 \u7b80\u5355\u5b9e\u73b0\uff08\u4ec5\u7528\u4e8e\u6587\u5b57\u6a21\u5f0f\u5bc6\u7801\u9a8c\u8bc1\uff09
function sha256(str) {
  function rightRotate(value, amount) { return (value >>> amount) | (value << (32 - amount)); }
  const maxWord = Math.pow(2, 32);
  const lengthProperty = 'length';
  let i, j;
  let result = '';
  const words = [];
  const asciiBitLength = str[lengthProperty] * 8;
  let hash = [];
  const k = [];
  let primeCounter = 0;
  const isComposite = {};
  for (let candidate = 2; primeCounter < 64; candidate++) {
    if (!isComposite[candidate]) {
      for (i = 0; i < 313; i += candidate) isComposite[i] = candidate;
      hash[primeCounter] = (Math.pow(candidate, 0.5) * maxWord) | 0;
      k[primeCounter++] = (Math.pow(candidate, 1 / 3) * maxWord) | 0;
    }
  }
  str += '\x80';
  while (str[lengthProperty] % 64 - 56) str += '\x00';
  for (i = 0; i < str[lengthProperty]; i++) {
    j = str.charCodeAt(i);
    if (j >> 8) return '';
    words[i >> 2] |= j << ((3 - i) % 4) * 8;
  }
  words[words[lengthProperty]] = ((asciiBitLength / maxWord) | 0);
  words[words[lengthProperty]] = (asciiBitLength);
  for (j = 0; j < words[lengthProperty];) {
    const w = words.slice(j, j += 16);
    const oldHash = hash;
    hash = hash.slice(0, 8);
    for (i = 0; i < 64; i++) {
      const w15 = w[i - 15], w2 = w[i - 2];
      const a = hash[0], e = hash[4];
      const temp1 = hash[7] + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25)) + ((e & hash[5]) ^ ((~e) & hash[6])) + k[i] + (w[i] = (i < 16) ? w[i] : (w[i - 16] + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15 >>> 3)) + w[i - 7] + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2 >>> 10))) | 0);
      const temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22)) + ((a & hash[1]) ^ (a & hash[2]) ^ (hash[1] & hash[2]));
      hash = [(temp1 + temp2) | 0].concat(hash);
      hash[4] = (hash[4] + temp1) | 0;
    }
    for (i = 0; i < 8; i++) hash[i] = (hash[i] + oldHash[i]) | 0;
  }
  for (i = 0; i < 8; i++) {
    for (j = 3; j + 1; j--) {
      const b = (hash[i] >> (j * 8)) & 255;
      result += ((b < 16) ? 0 : '') + b.toString(16);
    }
  }
  return result;
}

// ============ \u5c55\u793a\u9875\u9762\u903b\u8f91 ============
(function initViewPage() {
  const hash = window.location.hash;
  if (!hash.startsWith('#d=')) return;

  document.body.innerHTML = '';
  document.body.className = 'view-page';

  let payload;
  try {
    const base64 = hash.slice(3);
    payload = JSON.parse(decodeURIComponent(escape(atob(base64))));
  } catch (e) {
    showViewError('\u6570\u636e\u89e3\u6790\u5931\u8d25\uff0c\u4e8c\u7ef4\u7801\u53ef\u80fd\u5df2\u635f\u574f\u3002');
    return;
  }

  // --- \u56fe\u7247\u6a21\u5f0f ---
  if (payload.mode === 'image') {
    showImagePasswordGate(payload);
    return;
  }

  // --- \u6587\u5b57\u6a21\u5f0f ---
  const urlParams = new URLSearchParams(window.location.search);

  if (payload.pwd && !urlParams.get('auth')) {
    showPasswordGate(payload);
    return;
  }

  if (payload.pwd && urlParams.get('auth') !== payload.pwd) {
    showViewError('\u5bc6\u7801\u9a8c\u8bc1\u5931\u8d25\uff0c\u8bf7\u91cd\u65b0\u626b\u7801\u3002');
    return;
  }

  if (payload.expire && Date.now() > payload.expire) {
    showExpired();
    return;
  }

  // \u5c55\u793a\u6587\u5b57\u5185\u5bb9
  const card = document.createElement('div');
  card.className = 'view-card';

  const h2 = document.createElement('h2');
  h2.textContent = '\u626b\u7801\u5185\u5bb9';
  card.appendChild(h2);

  const content = document.createElement('div');
  content.className = 'content-area';
  content.textContent = payload.content;
  card.appendChild(content);

  const footer = document.createElement('footer');
  footer.style.cssText = 'margin-top:18px;color:#555;font-size:0.78em;';
  footer.textContent = '\u00A9 Marvis \u5de5\u5177';
  card.appendChild(footer);

  document.body.appendChild(card);
})();
