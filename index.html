
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界时钟 | World Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0b0b14;
    color: #d0d5e0;
    min-height: 100vh;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 32px 20px; }
  header {
    text-align: center;
    padding: 24px 0 32px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 24px;
  }
  header h1 { font-size: 28px; font-weight: 600; color: #fff; }
  header p { font-size: 13px; color: #6b7d99; margin-top: 6px; }
  .search-box {
    width: 100%; max-width: 500px; margin: 0 auto 24px; display: block;
    padding: 12px 20px; border-radius: 24px;
    border: 1px solid rgba(83,127,231,0.25);
    background: rgba(255,255,255,0.04); color: #d0d5e0;
    font-size: 15px; text-align: center; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-box:focus {
    border-color: #537fe7;
    box-shadow: 0 0 0 3px rgba(83,127,231,0.15);
  }
  .search-box::placeholder { color: #4a5568; }
  .city-list { display: flex; flex-direction: column; gap: 6px; }
  .city-row {
    display: flex; align-items: center;
    padding: 14px 20px;
    background: rgba(255,255,255,0.025);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.04);
    transition: all 0.2s;
    gap: 16px;
  }
  .city-row:hover { background: rgba(255,255,255,0.05); border-color: rgba(83,127,231,0.2); }
  .city-row.hidden { display: none; }
  .city-flag { font-size: 24px; width: 36px; text-align: center; flex-shrink: 0; }
  .city-info { flex: 1; min-width: 0; }
  .city-name { font-size: 15px; font-weight: 500; color: #e0e6f0; }
  .city-country { font-size: 11px; color: #5a6a82; margin-top: 2px; }
  .city-time {
    font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums;
    color: #fff; flex-shrink: 0; width: 90px; text-align: right;
    letter-spacing: 1px;
  }
  .city-seconds {
    font-size: 13px; color: #537fe7; width: 28px; text-align: left;
    font-variant-numeric: tabular-nums;
  }
  .city-offset {
    font-size: 12px; padding: 4px 10px; border-radius: 12px;
    font-weight: 500; flex-shrink: 0; width: 110px; text-align: center;
  }
  .offset-plus { background: rgba(34,197,94,0.12); color: #4ade80; }
  .offset-minus { background: rgba(239,68,68,0.12); color: #f87171; }
  .offset-zero { background: rgba(83,127,231,0.12); color: #818cf8; }
  .city-date {
    font-size: 11px; color: #4a5568; flex-shrink: 0; width: 100px;
    text-align: right;
  }
  .legend {
    display: flex; gap: 20px; justify-content: center; margin-bottom: 16px;
    font-size: 11px; color: #5a6a82;
  }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .ld-plus { background: #4ade80; }
  .ld-minus { background: #f87171; }
  .ld-zero { background: #818cf8; }

  footer {
    text-align: center; padding: 32px 0 16px;
    font-size: 11px; color: #3a4560;
  }
  @media (max-width: 640px) {
    .city-row { flex-wrap: wrap; gap: 8px; padding: 12px 14px; }
    .city-time { width: auto; font-size: 20px; }
    .city-offset { width: auto; }
    .city-date { width: auto; }
    header h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>世界时钟</h1>
    <p>实时显示全球主要城市时间与时差 · 以北京时间为基准</p>
  </header>

  <input class="search-box" id="search" type="text" placeholder="搜索城市..." oninput="filterCities()">

  <div class="legend">
    <span><span class="legend-dot ld-plus"></span> 比北京快</span>
    <span><span class="legend-dot ld-minus"></span> 比北京慢</span>
    <span><span class="legend-dot ld-zero"></span> 与北京同步</span>
  </div>

  <div class="city-list" id="cityList"></div>

  <footer>数据实时更新 · 由 Marvis 生成</footer>
</div>

<script>
const BEIJING_OFFSET = 8;

const cities = [
  { name:"北京", country:"中国", tz:"Asia/Shanghai", flag:"🇨🇳" },
  { name:"上海", country:"中国", tz:"Asia/Shanghai", flag:"🇨🇳" },
  { name:"香港", country:"中国", tz:"Asia/Hong_Kong", flag:"🇭🇰" },
  { name:"台北", country:"中国", tz:"Asia/Taipei", flag:"🇹🇼" },
  { name:"东京", country:"日本", tz:"Asia/Tokyo", flag:"🇯🇵" },
  { name:"首尔", country:"韩国", tz:"Asia/Seoul", flag:"🇰🇷" },
  { name:"新加坡", country:"新加坡", tz:"Asia/Singapore", flag:"🇸🇬" },
  { name:"曼谷", country:"泰国", tz:"Asia/Bangkok", flag:"🇹🇭" },
  { name:"胡志明市", country:"越南", tz:"Asia/Ho_Chi_Minh", flag:"🇻🇳" },
  { name:"雅加达", country:"印尼", tz:"Asia/Jakarta", flag:"🇮🇩" },
  { name:"马尼拉", country:"菲律宾", tz:"Asia/Manila", flag:"🇵🇭" },
  { name:"吉隆坡", country:"马来西亚", tz:"Asia/Kuala_Lumpur", flag:"🇲🇾" },
  { name:"新德里", country:"印度", tz:"Asia/Kolkata", flag:"🇮🇳" },
  { name:"孟买", country:"印度", tz:"Asia/Kolkata", flag:"🇮🇳" },
  { name:"迪拜", country:"阿联酋", tz:"Asia/Dubai", flag:"🇦🇪" },
  { name:"德黑兰", country:"伊朗", tz:"Asia/Tehran", flag:"🇮🇷" },
  { name:"伊斯坦布尔", country:"土耳其", tz:"Europe/Istanbul", flag:"🇹🇷" },
  { name:"莫斯科", country:"俄罗斯", tz:"Europe/Moscow", flag:"🇷🇺" },
  { name:"伦敦", country:"英国", tz:"Europe/London", flag:"🇬🇧" },
  { name:"巴黎", country:"法国", tz:"Europe/Paris", flag:"🇫🇷" },
  { name:"柏林", country:"德国", tz:"Europe/Berlin", flag:"🇩🇪" },
  { name:"罗马", country:"意大利", tz:"Europe/Rome", flag:"🇮🇹" },
  { name:"马德里", country:"西班牙", tz:"Europe/Madrid", flag:"🇪🇸" },
  { name:"阿姆斯特丹", country:"荷兰", tz:"Europe/Amsterdam", flag:"🇳🇱" },
  { name:"斯德哥尔摩", country:"瑞典", tz:"Europe/Stockholm", flag:"🇸🇪" },
  { name:"苏黎世", country:"瑞士", tz:"Europe/Zurich", flag:"🇨🇭" },
  { name:"开罗", country:"埃及", tz:"Africa/Cairo", flag:"🇪🇬" },
  { name:"拉各斯", country:"尼日利亚", tz:"Africa/Lagos", flag:"🇳🇬" },
  { name:"内罗毕", country:"肯尼亚", tz:"Africa/Nairobi", flag:"🇰🇪" },
  { name:"约翰内斯堡", country:"南非", tz:"Africa/Johannesburg", flag:"🇿🇦" },
  { name:"纽约", country:"美国", tz:"America/New_York", flag:"🇺🇸" },
  { name:"洛杉矶", country:"美国", tz:"America/Los_Angeles", flag:"🇺🇸" },
  { name:"芝加哥", country:"美国", tz:"America/Chicago", flag:"🇺🇸" },
  { name:"多伦多", country:"加拿大", tz:"America/Toronto", flag:"🇨🇦" },
  { name:"温哥华", country:"加拿大", tz:"America/Vancouver", flag:"🇨🇦" },
  { name:"墨西哥城", country:"墨西哥", tz:"America/Mexico_City", flag:"🇲🇽" },
  { name:"圣保罗", country:"巴西", tz:"America/Sao_Paulo", flag:"🇧🇷" },
  { name:"布宜诺斯艾利斯", country:"阿根廷", tz:"America/Argentina/Buenos_Aires", flag:"🇦🇷" },
  { name:"悉尼", country:"澳大利亚", tz:"Australia/Sydney", flag:"🇦🇺" },
  { name:"墨尔本", country:"澳大利亚", tz:"Australia/Melbourne", flag:"🇦🇺" },
  { name:"奥克兰", country:"新西兰", tz:"Pacific/Auckland", flag:"🇳🇿" },
];

const now = new Date();
const fmt = new Intl.DateTimeFormat('en-US', { timeZone:'UTC', hour12:false, hour:'2-digit', minute:'2-digit', weekday:'short', month:'short', day:'numeric' });

function getTimeInZone(tz) {
  const opt = { timeZone: tz, hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' };
  const parts = new Intl.DateTimeFormat('en-US', opt).formatToParts(new Date());
  const h = parts.find(p=>p.type==='hour').value;
  const m = parts.find(p=>p.type==='minute').value;
  const s = parts.find(p=>p.type==='second').value;
  return { hour:h, min:m, sec:s };
}

function getDateInZone(tz) {
  const opt = { timeZone: tz, weekday:'short', month:'short', day:'numeric' };
  return new Intl.DateTimeFormat('en-US', opt).format(new Date());
}

function getOffsetDisplay(tzOffset) {
  const diff = tzOffset - BEIJING_OFFSET;
  if (diff === 0) return { text:'与北京同步', cls:'offset-zero' };
  const sign = diff > 0 ? '+' : '';
  const cls = diff > 0 ? 'offset-plus' : 'offset-minus';
  return { text:`比北京${sign}${diff}小时`, cls };
}

function getTzOffset(tz) {
  const now = new Date();
  const utcStr = now.toLocaleString('en-US', { timeZone:'UTC', hour12:false });
  const tzStr = now.toLocaleString('en-US', { timeZone:tz, hour12:false });
  const utcDate = new Date(utcStr + ' UTC');
  const tzDate = new Date(tzStr);
  return (tzDate - utcDate) / 3600000;
}

function renderCities() {
  const list = document.getElementById('cityList');
  const searchTerm = document.getElementById('search').value.toLowerCase();
  list.innerHTML = '';
  cities.forEach(c => {
    const match = c.name.toLowerCase().includes(searchTerm) ||
                  c.country.toLowerCase().includes(searchTerm) ||
                  c.tz.toLowerCase().includes(searchTerm);
    const row = document.createElement('div');
    row.className = 'city-row';
    if (!match) row.classList.add('hidden');
    row.dataset.search = c.name + c.country + c.tz;

    const tzOffset = getTzOffset(c.tz);
    const t = getTimeInZone(c.tz);
    const dateStr = getDateInZone(c.tz);
    const off = getOffsetDisplay(tzOffset);

    row.innerHTML = `
      <div class="city-flag">${c.flag}</div>
      <div class="city-info">
        <div class="city-name">${c.name}</div>
        <div class="city-country">${c.country}</div>
      </div>
      <div class="city-date">${dateStr}</div>
      <div class="city-time">${t.hour}:${t.min}</div>
      <div class="city-seconds">${t.sec}</div>
      <div class="city-offset ${off.cls}">${off.text}</div>
    `;
    list.appendChild(row);
  });
}

function filterCities() {
  const term = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.city-row').forEach(row => {
    const text = row.dataset.search || '';
    row.classList.toggle('hidden', !text.includes(term));
  });
}

function tick() {
  document.querySelectorAll('.city-row').forEach(row => {
    const nameEl = row.querySelector('.city-name');
    if (!nameEl) return;
    const cityName = nameEl.textContent;
    const city = cities.find(c => c.name === cityName);
    if (!city) return;
    const t = getTimeInZone(city.tz);
    row.querySelector('.city-time').textContent = t.hour + ':' + t.min;
    row.querySelector('.city-seconds').textContent = t.sec;
    const dateStr = getDateInZone(city.tz);
    row.querySelector('.city-date').textContent = dateStr;
  });
}

renderCities();
setInterval(tick, 1000);
</script>
</body>
</html>
