
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浜岀淮鐮佺敓鎴愬櫒</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  /* 鏂囨湰灞曠ず椤甸潰鏍峰紡 */
  body.text-view { background: #0b0b14; padding: 20px; align-items: flex-start; }
  .text-view-container {
    display: none; max-width: 720px; margin: 40px auto; padding: 32px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  body.text-view .text-view-container { display: block; }
  body.text-view .container { display: none; }
  .text-view-container h2 { color: #fff; font-size: 18px; margin-bottom: 16px; }
  .text-view-container .label { font-size: 11px; color: #537fe7; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
  .text-view-content {
    background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px;
    color: #e0e6f0; font-size: 15px; line-height: 1.8;
    word-break: break-word; white-space: pre-wrap;
    min-height: 60px; max-height: 60vh; overflow-y: auto;
  }
  .text-view-back {
    display: inline-block; margin-top: 20px; padding: 10px 24px;
    background: linear-gradient(135deg, #537fe7, #3b82f6);
    color: #fff; text-decoration: none; border-radius: 24px;
    font-size: 13px; font-weight: 600;
  }
  .text-view-back:hover { box-shadow: 0 6px 20px rgba(59,130,246,0.45); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0b0b14;
    color: #d0d5e0;
    min-height: 100vh;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 32px 20px; }
  header {
    text-align: center; padding: 24px 0 28px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 28px;
  }
  header h1 { font-size: 28px; font-weight: 600; color: #fff; }
  header p { font-size: 13px; color: #6b7d99; margin-top: 6px; }

  .tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
  .tab {
    flex: 1; text-align: center; padding: 10px 0;
    border-radius: 10px; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; color: #6b7d99;
  }
  .tab:hover { color: #a0b4d0; }
  .tab.active { background: rgba(83,127,231,0.2); color: #a0c4ff; }

  .panel { display: none; }
  .panel.active { display: block; }

  .input-group { margin-bottom: 20px; }
  .input-group label { display: block; font-size: 12px; color: #6b7d99; margin-bottom: 8px; letter-spacing: 0.5px; }
  .input-group textarea, .input-group input[type="text"], .input-group input[type="url"] {
    width: 100%; padding: 14px 18px;
    border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03); color: #e0e6f0;
    font-size: 14px; outline: none; transition: border-color 0.2s;
    font-family: inherit;
  }
  .input-group textarea { min-height: 100px; resize: vertical; }
  .input-group textarea:focus, .input-group input:focus { border-color: rgba(83,127,231,0.4); }

  .upload-area {
    border: 2px dashed rgba(255,255,255,0.1);
    border-radius: 12px; padding: 40px 20px;
    text-align: center; cursor: pointer;
    transition: all 0.2s; margin-bottom: 20px;
  }
  .upload-area:hover, .upload-area.dragover {
    border-color: rgba(83,127,231,0.4);
    background: rgba(83,127,231,0.05);
  }
  .upload-icon { font-size: 36px; margin-bottom: 10px; }
  .upload-text { font-size: 14px; color: #8b9dc3; }
  .upload-hint { font-size: 11px; color: #4a5568; margin-top: 6px; }
  .upload-area.has-image { border-color: rgba(34,197,94,0.3); padding: 16px; }
  .upload-area img.preview { max-width: 100%; max-height: 200px; border-radius: 8px; display: block; margin: 0 auto; }

  .btn-group { display: flex; gap: 10px; margin-top: 20px; }
  .btn {
    padding: 12px 32px; border-radius: 24px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #537fe7, #3b82f6); color: #fff;
    box-shadow: 0 4px 16px rgba(59,130,246,0.3);
    flex: 1;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(59,130,246,0.45); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-ghost {
    background: rgba(255,255,255,0.06); color: #8b9dc3;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.1); }

  .result-area {
    margin-top: 24px; padding: 24px;
    background: rgba(255,255,255,0.025);
    border-radius: 12px; border: 1px solid rgba(255,255,255,0.04);
    text-align: center;
    display: none;
  }
  .result-area.show { display: block; }
  #qrcode { display: inline-block; padding: 16px; background: #fff; border-radius: 8px; }
  #qrcode img { display: block; }
  .result-text { font-size: 12px; color: #5a6a82; margin-top: 12px; word-break: break-all; }
  .result-hint { font-size: 11px; color: #4a5568; margin-top: 6px; }

  .mode-hint {
    font-size: 12px; color: #5a6a82;
    padding: 12px 16px; background: rgba(83,127,231,0.06);
    border-radius: 8px; margin-bottom: 16px;
    border-left: 3px solid rgba(83,127,231,0.3);
  }

  .toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    background: #22c55e; color: #000; padding: 12px 28px;
    border-radius: 24px; font-size: 14px; font-weight: 600;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 2000;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: #ef4444; color: #fff; }

  .status-text { font-size: 12px; color: #5a6a82; margin-top: 8px; min-height: 18px; }

  footer {
    text-align: center; padding: 40px 0 16px;
    font-size: 11px; color: #3a4560;
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- 鏂囨湰灞曠ず椤甸潰锛堟壂鐮佸悗鏄剧ず锛?-->
<div class="text-view-container">
  <div class="label">鎵爜鍐呭</div>
  <h2>&#128203; 鏂囨湰淇℃伅</h2>
  <div class="text-view-content" id="textViewContent"></div>
  <a class="text-view-back" href=".">&#8592; 杩斿洖鐢熸垚鍣?/a>
</div>

<div class="container">
  <header>
    <h1>浜岀淮鐮佺敓鎴愬櫒</h1>
    <p>鏂囨湰 / 閾炬帴 / 鍥剧墖 鈫?涓€閿敓鎴愬彲鎵爜鐨勪簩缁寸爜</p>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="text" onclick="switchTab('text')">鏂囨湰</div>
    <div class="tab" data-tab="link" onclick="switchTab('link')">閾炬帴</div>
    <div class="tab" data-tab="image" onclick="switchTab('image')">鍥剧墖</div>
  </div>

  <!-- 鏂囨湰妯″紡 -->
  <div class="panel active" id="panel-text">
    <div class="mode-hint">杈撳叆浠绘剰鏂囧瓧锛岀敓鎴愪簩缁寸爜銆傛壂鐮佸悗鐩存帴鏄剧ず杩欐鏂囧瓧銆?/div>
    <div class="input-group">
      <label>杈撳叆鏂囧瓧鍐呭</label>
      <textarea id="textInput" placeholder="璇疯緭鍏ヨ杞崲鎴愪簩缁寸爜鐨勬枃瀛楀唴瀹?.."></textarea>
    </div>
    <button class="btn btn-primary" onclick="generateTextQR()">鐢熸垚浜岀淮鐮?/button>
    <div class="result-area" id="result-text">
      <div id="qrcode-text"></div>
      <div class="result-text" id="resultTextContent"></div>
      <div class="result-hint">浣跨敤寰俊/鏀粯瀹濇壂鐮佸嵆鍙煡鐪嬪唴瀹?/div>
    </div>
  </div>

  <!-- 閾炬帴妯″紡 -->
  <div class="panel" id="panel-link">
    <div class="mode-hint">杈撳叆缃戝潃閾炬帴锛岀敓鎴愪簩缁寸爜銆傛壂鐮佸悗鑷姩璺宠浆鍒拌閾炬帴銆?/div>
    <div class="input-group">
      <label>杈撳叆缃戝潃閾炬帴</label>
      <input type="url" id="linkInput" placeholder="https://example.com">
    </div>
    <button class="btn btn-primary" onclick="generateLinkQR()">鐢熸垚浜岀淮鐮?/button>
    <div class="result-area" id="result-link">
      <div id="qrcode-link"></div>
      <div class="result-text" id="resultLinkContent"></div>
      <div class="result-hint">浣跨敤寰俊/鏀粯瀹濇壂鐮佸嵆鍙烦杞?/div>
    </div>
  </div>

  <!-- 鍥剧墖妯″紡 -->
  <div class="panel" id="panel-image">
    <div class="mode-hint">涓婁紶鍥剧墖锛岀敓鎴愪簩缁寸爜銆傛壂鐮佸悗鎵撳紑椤甸潰灞曠ず杩欏紶鍥剧墖銆?/div>
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon" id="uploadIcon">&#128247;</div>
      <div class="upload-text" id="uploadText">鐐瑰嚮涓婁紶鍥剧墖</div>
      <div class="upload-hint">鏀寔 JPG / PNG / GIF锛屽缓璁皬浜?5MB</div>
      <img class="preview" id="preview" style="display:none">
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
    <div id="imageStatus" class="status-text"></div>
    <div class="btn-group">
      <button class="btn btn-primary" id="generateImageBtn" onclick="generateImageQR()" disabled>鐢熸垚浜岀淮鐮?/button>
    </div>
    <div class="result-area" id="result-image">
      <div id="qrcode-image"></div>
      <div class="result-text" id="resultImageContent"></div>
      <div class="result-hint">鎵爜鍚庢墦寮€鍥剧墖灞曠ず椤甸潰</div>
    </div>
  </div>

  <footer>鐢?Marvis 鐢熸垚</footer>
</div>

<script>
// 妫€娴嬫槸鍚︿负鏂囨湰灞曠ず妯″紡锛堟壂鐮佽繘鍏ワ級
(function checkTextView() {
  const hash = window.location.hash;
  if (hash.startsWith('#text=')) {
    try {
      const encoded = hash.substring(6);
      const decoded = decodeURIComponent(escape(atob(encoded)));
      document.body.classList.add('text-view');
      document.getElementById('textViewContent').textContent = decoded;
      document.title = '鎵爜鍐呭';
    } catch(e) {
      document.body.classList.add('text-view');
      document.getElementById('textViewContent').textContent = '[鍐呭瑙ｆ瀽澶辫触]';
    }
  }
})();

let currentImageDataURL = null;
let imgurLink = null;

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
  // 闅愯棌鎵€鏈夌粨鏋?  document.querySelectorAll('.result-area').forEach(r => r.classList.remove('show'));
}

function clearQR(containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
}

function generateQR(containerId, content, resultElId, displayContent) {
  clearQR(containerId);
  const container = document.getElementById(containerId);
  // 浜岀淮鐮佸昂瀵歌嚜閫傚簲
  const size = Math.min(280, window.innerWidth - 80);
  new QRCode(container, {
    text: content,
    width: size,
    height: size,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
  const resultArea = container.closest('.result-area');
  resultArea.classList.add('show');
  const displayEl = document.getElementById(resultElId);
  if (displayEl) {
    displayEl.textContent = displayContent || content;
  }
}

function generateTextQR() {
  const text = document.getElementById('textInput').value.trim();
  if (!text) { showToast('璇疯緭鍏ユ枃瀛楀唴瀹?, true); return; }
  // 鏂囨湰Base64缂栫爜鍚庡祵鍏RL锛屽井淇℃壂鐮佽烦杞綉椤靛睍绀?  const encoded = btoa(unescape(encodeURIComponent(text)));
  const showURL = window.location.origin + window.location.pathname + '#text=' + encoded;
  generateQR('qrcode-text', showURL, 'resultTextContent', text.length > 60 ? text.substring(0, 60) + '...' : text);
}

function generateLinkQR() {
  let link = document.getElementById('linkInput').value.trim();
  if (!link) { showToast('璇疯緭鍏ラ摼鎺?, true); return; }
  if (!link.startsWith('http://') && !link.startsWith('https://')) {
    link = 'https://' + link;
  }
  generateQR('qrcode-link', link, 'resultLinkContent', link);
}

function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    currentImageDataURL = e.target.result;
    const preview = document.getElementById('preview');
    preview.src = currentImageDataURL;
    preview.style.display = 'block';
    document.getElementById('uploadIcon').style.display = 'none';
    document.getElementById('uploadText').textContent = file.name + ' (' + (file.size/1024).toFixed(1) + 'KB)';
    document.getElementById('uploadArea').classList.add('has-image');
    document.getElementById('imageStatus').textContent = '鍥剧墖宸蹭笂浼狅紝姝ｅ湪鑾峰彇鍏紑閾炬帴...';
    document.getElementById('generateImageBtn').disabled = true;

    // 涓婁紶鍒?Imgur 鑾峰彇鍏紑閾炬帴
    uploadToImgur(file);
  };
  reader.readAsDataURL(file);
}

async function uploadToImgur(file) {
  const formData = new FormData();
  formData.append('image', file);

  try {
    const resp = await fetch('https://api.imgur.com/3/image', {
      method: 'POST',
      headers: {
        'Authorization': 'Client-ID 9e57cb1c4b5c0e8'
      },
      body: formData
    });
    const data = await resp.json();
    if (data.success) {
      imgurLink = data.data.link;
      document.getElementById('imageStatus').textContent = '涓婁紶鎴愬姛 鉁?鍙敓鎴愪簩缁寸爜';
      document.getElementById('imageStatus').style.color = '#4ade80';
      document.getElementById('generateImageBtn').disabled = false;
    } else {
      throw new Error(data.data?.error || '涓婁紶澶辫触');
    }
  } catch (err) {
    console.error('Imgur upload failed:', err);
    // 闄嶇骇鏂规锛氫娇鐢?data URL 鐩存帴鐢熸垚
    imgurLink = currentImageDataURL;
    document.getElementById('imageStatus').textContent = '鈿狅笍 鍥惧簥涓婁紶澶辫触锛屽凡鍒囨崲涓哄唴宓屾ā寮忥紙鎵爜鍙兘涓嶅吋瀹癸級';
    document.getElementById('imageStatus').style.color = '#fbbf24';
    document.getElementById('generateImageBtn').disabled = false;
  }
}

function generateImageQR() {
  if (!imgurLink) { showToast('璇峰厛涓婁紶鍥剧墖', true); return; }
  generateQR('qrcode-image', imgurLink, 'resultImageContent',
    imgurLink.startsWith('data:') ? '[鍥剧墖鍐呭祵妯″紡] 閮ㄥ垎鎵爜鍣ㄥ彲鑳戒笉鏀寔' : '鎵爜鏌ョ湅鍥剧墖');
}
</script>
</body>
</html>
