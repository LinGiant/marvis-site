<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二维码生成器</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
:root {
  --bg: #0d0d1a;
  --card: #15152a;
  --border: #2a2a45;
  --primary: #6c5ce7;
  --primary-glow: rgba(108,92,231,0.3);
  --text: #e0e0e0;
  --muted: #888;
  --danger: #e74c3c;
  --success: #2ecc71;
  --radius: 14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 16px;
}
.container { max-width: 540px; width: 100%; }

/* Header */
.header { text-align: center; margin-bottom: 28px; }
.header h1 {
  font-size: 2em;
  font-weight: 700;
  background: linear-gradient(135deg, #a78bfa, #6c5ce7, #4f46e5);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
}
.header .sub { color: var(--muted); font-size: 0.85em; margin-top: 6px; }

/* Tabs */
.tabs {
  display: flex;
  background: var(--card);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 11px 0;
  text-align: center;
  cursor: pointer;
  border-radius: 11px;
  font-size: 0.95em;
  font-weight: 500;
  transition: all 0.25s;
  background: transparent;
  color: var(--muted);
  border: none;
  font-family: inherit;
}
.tab.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 4px 15px var(--primary-glow);
}

/* Card */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
}
.card label {
  display: block;
  font-size: 0.88em;
  color: #bbb;
  margin-bottom: 8px;
  font-weight: 500;
}
textarea, input[type="text"], input[type="url"], input[type="password"] {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #0d0d1a;
  color: var(--text);
  font-size: 0.95em;
  font-family: inherit;
  transition: border-color 0.2s;
}
textarea { min-height: 110px; resize: vertical; }
textarea:focus, input:focus { outline: none; border-color: var(--primary); }
input::placeholder, textarea::placeholder { color: #555; }

/* File Upload */
.file-upload-area {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 28px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  background: #0d0d1a;
}
.file-upload-area:hover { border-color: var(--primary); background: #12122a; }
.file-upload-area .upload-icon { font-size: 2.2em; margin-bottom: 8px; }
.file-upload-area .hint { color: var(--muted); font-size: 0.82em; margin-top: 6px; }
.file-upload-area input[type="file"] { display: none; }
.preview-img {
  max-width: 220px;
  max-height: 130px;
  border-radius: 10px;
  margin: 12px auto 0;
  display: block;
  border: 1px solid var(--border);
}

/* Settings Cards */
.settings-section { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.setting-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.3s;
}
.setting-card.active { border-color: var(--primary); }
.setting-header {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  gap: 14px;
  transition: background 0.2s;
}
.setting-header:hover { background: rgba(108,92,231,0.06); }
.setting-icon { font-size: 1.5em; flex-shrink: 0; line-height: 1; }
.setting-info { flex: 1; min-width: 0; }
.setting-title { font-size: 0.95em; font-weight: 600; color: #ddd; }
.setting-desc { font-size: 0.78em; color: var(--muted); margin-top: 2px; transition: color 0.3s; }
.setting-card.active .setting-desc { color: var(--primary); }
.setting-switch {
  position: relative;
  width: 52px;
  height: 30px;
  background: #3a3a55;
  border-radius: 15px;
  transition: background 0.3s;
  flex-shrink: 0;
}
.setting-switch::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 24px; height: 24px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.setting-switch.on { background: var(--primary); }
.setting-switch.on::after { transform: translateX(22px); }
.setting-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, padding 0.35s ease;
  padding: 0 20px;
}
.setting-body.open { max-height: 80px; padding: 0 20px 16px; }
.expire-select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #0d0d1a;
  color: var(--text);
  font-size: 0.9em;
  font-family: inherit;
  cursor: pointer;
}
.expire-select:focus { outline: none; border-color: var(--primary); }
.setting-body input[type="password"] {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #0d0d1a;
  color: var(--text);
  font-size: 0.9em;
  font-family: inherit;
}
.setting-body input[type="password"]:focus { outline: none; border-color: var(--primary); }

/* Generate Btn */
.generate-btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #7c6ff7, #5b4dcd);
  color: #fff;
  font-size: 1.05em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s;
  letter-spacing: 1px;
  font-family: inherit;
}
.generate-btn:hover { background: linear-gradient(135deg, #8b7df8, #6c5ee7); transform: translateY(-1px); box-shadow: 0 8px 25px var(--primary-glow); }
.generate-btn:active { transform: translateY(0); }
.generate-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

/* QR Result */
.qr-result { text-align: center; margin-top: 24px; display: none; }
.qr-result.show { display: block; animation: fadeIn 0.4s ease; }
.qr-result .qr-wrapper {
  display: inline-block;
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 8px 30px rgba(108,92,231,0.25);
}
.qr-result .qr-meta { margin-top: 14px; color: var(--muted); font-size: 0.85em; }
.qr-result .qr-meta span { display: block; margin-top: 4px; }
.download-btn {
  display: inline-block;
  margin-top: 14px;
  padding: 10px 28px;
  border: 1px solid var(--primary);
  border-radius: 10px;
  background: transparent;
  color: var(--primary);
  font-size: 0.92em;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.download-btn:hover { background: var(--primary); color: #fff; }

/* Status */
.status { font-size: 0.84em; margin-top: 8px; }
.status.success { color: var(--success); }
.status.error { color: var(--danger); }

footer {
  text-align: center;
  color: #444;
  font-size: 0.78em;
  margin-top: 30px;
  padding-bottom: 20px;
}

/* ========== 展示页面样式 ========== */
body.view-page {
  display: flex;
  align-items: center;
  justify-content: center;
}
.view-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  max-width: 600px;
  width: 90%;
  text-align: center;
}
.view-card h2 { font-size: 1.3em; margin-bottom: 16px; color: #a78bfa; }
.view-card .content-area {
  background: #0d0d1a;
  border-radius: 10px;
  padding: 20px;
  text-align: left;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.8;
  max-height: 65vh;
  overflow-y: auto;
  font-size: 0.95em;
}
.view-card .content-area img { max-width: 100%; border-radius: 8px; }
.view-card .expired-msg { color: var(--danger); font-size: 1.1em; padding: 30px 0; }
.view-card .pwd-hint { color: var(--muted); font-size: 0.85em; margin-top: 10px; }
.view-card footer { margin-top: 18px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Responsive */
@media (max-width: 480px) {
  .options-row { flex-direction: column; }
  .header h1 { font-size: 1.5em; }
}
</style>
</head>
<body>
<div class="container" id="generator">
  <div class="header">
    <h1>二维码生成器</h1>
    <div class="sub">文字 &amp; 图片 &middot; 密码保护 &middot; 时效控制</div>
  </div>

  <!-- 模式切换 -->
  <div class="tabs">
    <button class="tab active" data-mode="text">文字</button>
    <button class="tab" data-mode="image">图片</button>
  </div>

  <!-- 文字模式 -->
  <div class="card mode-panel" id="panel-text">
    <label>输入文字内容</label>
    <textarea id="textInput" placeholder="在这里输入您要分享的文字，扫码后就能看到..."></textarea>
  </div>

  <!-- 图片模式 -->
  <div class="card mode-panel" id="panel-image" style="display:none">
    <label>选择图片</label>
    <div class="file-upload-area" id="uploadArea">
      <div class="upload-icon">🖼</div>
      <div>点击上传图片</div>
      <div class="hint">支持 JPG / PNG / GIF / WebP，最大 10MB</div>
      <input type="file" id="imageInput" accept="image/*">
    </div>
    <div id="uploadStatus" class="status" style="margin-top:10px;display:none"></div>
    <img id="previewImg" class="preview-img" style="display:none">
  </div>

  <!-- 可选设置 -->
  <div class="settings-section">
    <!-- 有效期 -->
    <div class="setting-card" id="expireCard">
      <div class="setting-header" id="expireHeader">
        <div class="setting-icon">⏱</div>
        <div class="setting-info">
          <div class="setting-title">有效期</div>
          <div class="setting-desc" id="expireDesc">关闭</div>
        </div>
        <div class="setting-switch" id="expireSwitch"></div>
      </div>
      <div class="setting-body" id="expireBody">
        <select class="expire-select" id="expireDuration">
          <option value="1">1 小时后过期</option>
          <option value="6">6 小时后过期</option>
          <option value="24" selected>24 小时后过期</option>
          <option value="72">3 天后过期</option>
          <option value="168">7 天后过期</option>
          <option value="720">30 天后过期</option>
        </select>
      </div>
    </div>

    <!-- 访问密码 -->
    <div class="setting-card" id="pwdCard">
      <div class="setting-header" id="pwdHeader">
        <div class="setting-icon">🔒</div>
        <div class="setting-info">
          <div class="setting-title">访问密码</div>
          <div class="setting-desc" id="pwdDesc">关闭</div>
        </div>
        <div class="setting-switch" id="pwdSwitch"></div>
      </div>
      <div class="setting-body" id="pwdBody">
        <input type="password" id="pwdInput" placeholder="设置 4-20 位密码" maxlength="20">
      </div>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn">生成二维码</button>

  <div class="qr-result" id="qrResult">
    <div class="qr-wrapper">
      <div id="qrcode"></div>
    </div>
    <div id="expireHint" class="status success" style="display:none;margin-top:10px"></div>
    <button class="download-btn" id="downloadBtn" style="display:none;">下载高清二维码 (PNG)</button>
  </div>

  <footer>&copy; Marvis 工具</footer>
</div>

<script>
// ============ 生成页面逻辑 ============
let currentMode = 'text';
let uploadedImageUrl = null;
let qrContentString = ''; // 二维码实际编码的字符串

// --- 设置卡片开关 ---
let expireEnabled = false;
let pwdEnabled = false;

function toggleSetting(type) {
  const card = document.getElementById(type + 'Card');
  const sw = document.getElementById(type + 'Switch');
  const body = document.getElementById(type + 'Body');
  const desc = document.getElementById(type + 'Desc');
  const isOn = type === 'expire' ? expireEnabled : pwdEnabled;

  if (type === 'expire') {
    expireEnabled = !expireEnabled;
    sw.classList.toggle('on', expireEnabled);
    card.classList.toggle('active', expireEnabled);
    body.classList.toggle('open', expireEnabled);
    if (expireEnabled) {
      const dur = document.getElementById('expireDuration');
      const labels = { '1':'1小时后过期','6':'6小时后过期','24':'24小时后过期','72':'3天后过期','168':'7天后过期','720':'30天后过期' };
      desc.textContent = labels[dur.value] || '已启用';
    } else {
      desc.textContent = '关闭';
    }
  } else {
    pwdEnabled = !pwdEnabled;
    sw.classList.toggle('on', pwdEnabled);
    card.classList.toggle('active', pwdEnabled);
    body.classList.toggle('open', pwdEnabled);
    if (pwdEnabled) {
      desc.textContent = '已启用';
    } else {
      desc.textContent = '关闭';
      document.getElementById('pwdInput').value = '';
    }
  }
}

document.getElementById('expireHeader').addEventListener('click', () => toggleSetting('expire'));
document.getElementById('pwdHeader').addEventListener('click', () => toggleSetting('pwd'));

// 有效期下拉变化时更新描述
document.getElementById('expireDuration').addEventListener('change', function() {
  const labels = { '1':'1小时后过期','6':'6小时后过期','24':'24小时后过期','72':'3天后过期','168':'7天后过期','720':'30天后过期' };
  document.getElementById('expireDesc').textContent = labels[this.value];
});

// --- 模式切换 ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMode = tab.dataset.mode;
    document.querySelectorAll('.mode-panel').forEach(p => p.style.display = 'none');
    document.getElementById('panel-' + currentMode).style.display = '';
    document.getElementById('qrResult').classList.remove('show');
    document.getElementById('downloadBtn').style.display = 'none';
  });
});

// --- 图片处理（客户端压缩为 base64，不依赖外部图床） ---
document.getElementById('uploadArea').addEventListener('click', () => {
  document.getElementById('imageInput').click();
});

document.getElementById('imageInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const status = document.getElementById('uploadStatus');
  status.style.display = 'block';
  status.textContent = '处理中...';
  status.className = 'status';

  try {
    const dataUrl = await compressImage(file, 200, 0.5);
    document.getElementById('previewImg').src = dataUrl;
    document.getElementById('previewImg').style.display = 'block';
    uploadedImageUrl = dataUrl;
    const sizeKB = (dataUrl.length / 1024).toFixed(1);
    status.textContent = '已就绪（' + sizeKB + ' KB）';
    status.className = 'status success';
  } catch (err) {
    status.textContent = '处理失败，请重试';
    status.className = 'status error';
    uploadedImageUrl = null;
  }
});

function compressImage(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h) { if (w > maxSize) { h = h * maxSize / w; w = maxSize; } }
        else { if (h > maxSize) { w = w * maxSize / h; h = maxSize; } }
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// --- 生产 512x512 高清二维码 Canvas ---
function renderHighResQR(data, size) {
  return new Promise((resolve) => {
    const qr = qrcode(0, 'L');
    qr.addData(data);
    qr.make();
    const moduleCount = qr.getModuleCount();
    const cellSize = Math.floor(size / moduleCount);
    const dataUrl = qr.createDataURL(cellSize, 0);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, size, size);
      ctx.drawImage(img, 0, 0, size, size);
      resolve(canvas);
    };
    img.src = dataUrl;
  });
}

// --- 构建 payload ---
function buildPayload() {
  const payload = { mode: currentMode };

  if (currentMode === 'text') {
    payload.content = document.getElementById('textInput').value.trim();
  } else {
    payload.content = uploadedImageUrl;
  }

  if (expireEnabled) {
    const hours = parseInt(document.getElementById('expireDuration').value);
    payload.expire = Date.now() + hours * 3600 * 1000;
  }

  if (pwdEnabled) {
    const pwd = document.getElementById('pwdInput').value.trim();
    if (!pwd || pwd.length < 4) return { error: '密码至少 4 位' };
    payload.pwd = sha256(pwd);
  }

  return payload;
}

// --- 生成二维码 ---
document.getElementById('generateBtn').addEventListener('click', async () => {
  const resultDiv = document.getElementById('qrResult');
  const qrContainer = document.getElementById('qrcode');
  const downloadBtn = document.getElementById('downloadBtn');
  const expireHint = document.getElementById('expireHint');

  qrContainer.innerHTML = '';
  downloadBtn.style.display = 'none';
  expireHint.style.display = 'none';

  if (currentMode === 'text') {
    const text = document.getElementById('textInput').value.trim();
    if (!text) {
      resultDiv.classList.add('show');
      qrContainer.innerHTML = '<span style="color:#e74c3c;font-size:0.9em">请输入文字内容</span>';
      return;
    }
  } else {
    if (!uploadedImageUrl) {
      resultDiv.classList.add('show');
      qrContainer.innerHTML = '<span style="color:#e74c3c;font-size:0.9em">请先上传图片</span>';
      return;
    }
  }

  const payload = buildPayload();
  if (payload.error) {
    resultDiv.classList.add('show');
    qrContainer.innerHTML = '<span style="color:#e74c3c;font-size:0.9em">' + payload.error + '</span>';
    return;
  }

  const payloadJson = JSON.stringify(payload);
  const payloadBase64 = btoa(unescape(encodeURIComponent(payloadJson)));
  qrContentString = window.location.origin + window.location.pathname + '#d=' + payloadBase64;

  try {
    const qr = qrcode(0, 'L');
    qr.addData(qrContentString);
    qr.make();
    qrContainer.innerHTML = qr.createImgTag(4);
    resultDiv.classList.add('show');

    if (payload.expire) {
      const expireDate = new Date(payload.expire);
      expireHint.textContent = '有效期至：' + expireDate.toLocaleString('zh-CN');
      expireHint.style.display = 'block';
    }

    downloadBtn.style.display = 'inline-block';
  } catch (err) {
    qrContainer.innerHTML = '<span style="color:#e74c3c;font-size:0.9em">生成失败：' + err.message + '</span>';
    resultDiv.classList.add('show');
  }
});

// --- 下载高清二维码 ---
document.getElementById('downloadBtn').addEventListener('click', async () => {
  if (!qrContentString) return;
  const btn = document.getElementById('downloadBtn');
  btn.textContent = '生成中...';
  btn.disabled = true;

  const canvas = await renderHighResQR(qrContentString, 1024);
  canvas.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'qrcode_' + Date.now() + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    btn.textContent = '下载高清二维码 (PNG)';
    btn.disabled = false;
  }, 'image/png');
});

// SHA-256 简单实现
function sha256(str) {
  function rightRotate(value, amount) { return (value >>> amount) | (value << (32 - amount)); }
  const maxWord = Math.pow(2, 32);
  const lengthProperty = 'length';
  let i, j;
  let result = '';
  const words = [];
  const asciiBitLength = str[lengthProperty] * 8;
  let hash = [];
  const k = [];
  let primeCounter = 0;
  const isComposite = {};
  for (let candidate = 2; primeCounter < 64; candidate++) {
    if (!isComposite[candidate]) {
      for (i = 0; i < 313; i += candidate) isComposite[i] = candidate;
      hash[primeCounter] = (Math.pow(candidate, 0.5) * maxWord) | 0;
      k[primeCounter++] = (Math.pow(candidate, 1 / 3) * maxWord) | 0;
    }
  }
  str += '\x80';
  while (str[lengthProperty] % 64 - 56) str += '\x00';
  for (i = 0; i < str[lengthProperty]; i++) {
    j = str.charCodeAt(i);
    if (j >> 8) return '';
    words[i >> 2] |= j << ((3 - i) % 4) * 8;
  }
  words[words[lengthProperty]] = ((asciiBitLength / maxWord) | 0);
  words[words[lengthProperty]] = (asciiBitLength);
  for (j = 0; j < words[lengthProperty];) {
    const w = words.slice(j, j += 16);
    const oldHash = hash;
    hash = hash.slice(0, 8);
    for (i = 0; i < 64; i++) {
      const w15 = w[i - 15], w2 = w[i - 2];
      const a = hash[0], e = hash[4];
      const temp1 = hash[7] + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25)) + ((e & hash[5]) ^ ((~e) & hash[6])) + k[i] + (w[i] = (i < 16) ? w[i] : (w[i - 16] + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15 >>> 3)) + w[i - 7] + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2 >>> 10))) | 0);
      const temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22)) + ((a & hash[1]) ^ (a & hash[2]) ^ (hash[1] & hash[2]));
      hash = [(temp1 + temp2) | 0].concat(hash);
      hash[4] = (hash[4] + temp1) | 0;
    }
    for (i = 0; i < 8; i++) hash[i] = (hash[i] + oldHash[i]) | 0;
  }
  for (i = 0; i < 8; i++) {
    for (j = 3; j + 1; j--) {
      const b = (hash[i] >> (j * 8)) & 255;
      result += ((b < 16) ? 0 : '') + b.toString(16);
    }
  }
  return result;
}

// ============ 展示页面逻辑 ============
(function initViewPage() {
  const hash = window.location.hash;
  if (!hash.startsWith('#d=')) return;

  document.body.innerHTML = '';
  document.body.className = 'view-page';

  let payload;
  try {
    const base64 = hash.slice(3);
    payload = JSON.parse(decodeURIComponent(escape(atob(base64))));
  } catch (e) {
    showViewError('数据解析失败，二维码可能已损坏。');
    return;
  }

  // 检查是否传入密码参数（从密码输入后重新跳转过来的）
  const urlParams = new URLSearchParams(window.location.search);

  // 如果有密码保护且尚未验证
  if (payload.pwd && !urlParams.get('auth')) {
    showPasswordGate(payload);
    return;
  }

  // 验证密码
  if (payload.pwd && urlParams.get('auth') !== payload.pwd) {
    showViewError('密码验证失败，请重新扫码。');
    return;
  }

  // 检查过期
  if (payload.expire && Date.now() > payload.expire) {
    showExpired();
    return;
  }

  // 展示内容
  const card = document.createElement('div');
  card.className = 'view-card';

  const h2 = document.createElement('h2');
  h2.textContent = payload.mode === 'text' ? '扫码内容' : '扫码图片';
  card.appendChild(h2);

  const content = document.createElement('div');
  content.className = 'content-area';

  if (payload.mode === 'text') {
    content.textContent = payload.content;
  } else {
    const img = document.createElement('img');
    img.src = payload.content;
    img.alt = '图片';
    img.style.maxWidth = '100%';
    img.style.borderRadius = '8px';
    img.onerror = () => { content.textContent = '图片加载失败，链接可能已失效。'; };
    content.style.textAlign = 'center';
    content.appendChild(img);
  }

  card.appendChild(content);

  const footer = document.createElement('footer');
  footer.style.cssText = 'margin-top:18px;color:#555;font-size:0.78em;';
  footer.textContent = '© Marvis 工具';
  card.appendChild(footer);

  document.body.appendChild(card);
})();

function showPasswordGate(payload) {
  const card = document.createElement('div');
  card.className = 'view-card';

  const h2 = document.createElement('h2');
  h2.textContent = '请输入访问密码';
  card.appendChild(h2);

  const pwdInput = document.createElement('input');
  pwdInput.type = 'password';
  pwdInput.placeholder = '输入密码';
  pwdInput.style.cssText = 'width:100%;max-width:280px;margin:12px auto;display:block;';
  pwdInput.id = 'viewPwdInput';
  card.appendChild(pwdInput);

  const btn = document.createElement('button');
  btn.textContent = '验证';
  btn.className = 'generate-btn';
  btn.style.cssText = 'max-width:280px;margin:0 auto;display:block;';
  btn.addEventListener('click', () => {
    const input = document.getElementById('viewPwdInput').value;
    if (sha256(input) === payload.pwd) {
      // 重新加载带 auth 参数
      const base64 = window.location.hash.slice(3);
      window.location.search = '?auth=' + sha256(input);
    } else {
      const hint = card.querySelector('.pwd-hint') || document.createElement('div');
      hint.className = 'pwd-hint';
      hint.textContent = '密码错误，请重试';
      hint.style.color = '#e74c3c';
      card.appendChild(hint);
    }
  });
  card.appendChild(btn);

  const footer = document.createElement('footer');
  footer.style.cssText = 'margin-top:18px;color:#555;font-size:0.78em;';
  footer.textContent = '© Marvis 工具';
  card.appendChild(footer);

  document.body.appendChild(card);
  // 自动聚焦
  setTimeout(() => pwdInput.focus(), 100);
}

function showViewError(msg) {
  const card = document.createElement('div');
  card.className = 'view-card';
  const h2 = document.createElement('h2');
  h2.textContent = msg;
  h2.style.color = '#e74c3c';
  card.appendChild(h2);
  document.body.appendChild(card);
}

function showExpired() {
  const card = document.createElement('div');
  card.className = 'view-card';
  const h2 = document.createElement('h2');
  h2.textContent = '该二维码已过期';
  h2.style.color = '#e74c3c';
  card.appendChild(h2);
  const p = document.createElement('p');
  p.style.cssText = 'color:#888;margin-top:12px;';
  p.textContent = '请联系分享者重新生成二维码。';
  card.appendChild(p);
  document.body.appendChild(card);
}
</script>
