<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二维码生成器</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
:root{--bg:#0d0d1a;--card:#15152a;--border:#2a2a45;--primary:#6c5ce7;--primary-glow:rgba(108,92,231,0.3);--text:#e0e0e0;--muted:#888;--danger:#e74c3c;--success:#2ecc71;--radius:14px}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:30px 16px}.container{max-width:540px;width:100%}.header{text-align:center;margin-bottom:28px}.header h1{font-size:2em;font-weight:700;background:linear-gradient(135deg,#a78bfa,#6c5ce7,#4f46e5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}.header .sub{color:var(--muted);font-size:0.85em;margin-top:6px}.tabs{display:flex;background:var(--card);border-radius:var(--radius);padding:4px;margin-bottom:20px;border:1px solid var(--border)}.tab{flex:1;padding:11px 0;text-align:center;cursor:pointer;border-radius:11px;font-size:0.95em;font-weight:500;transition:all 0.25s;background:transparent;color:var(--muted);border:none;font-family:inherit}.tab.active{background:var(--primary);color:#fff;box-shadow:0 4px 15px var(--primary-glow)}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}.card label{display:block;font-size:0.88em;color:#bbb;margin-bottom:8px;font-weight:500}textarea,input[type="text"],input[type="url"],input[type="password"]{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;background:#0d0d1a;color:var(--text);font-size:0.95em;font-family:inherit;transition:border-color 0.2s}textarea{min-height:110px;resize:vertical}textarea:focus,input:focus{outline:none;border-color:var(--primary)}input::placeholder,textarea::placeholder{color:#555}.file-upload-area{border:2px dashed var(--border);border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:all 0.3s;background:#0d0d1a}.file-upload-area:hover{border-color:var(--primary);background:#12122a}.file-upload-area .upload-icon{font-size:2.2em;margin-bottom:8px}.file-upload-area .hint{color:var(--muted);font-size:0.82em;margin-top:6px}.file-upload-area input[type="file"]{display:none}.preview-img{max-width:220px;max-height:130px;border-radius:10px;margin:12px auto 0;display:block;border:1px solid var(--border)}.options-row{display:flex;gap:12px;flex-wrap:wrap}.options-row .card{flex:1;min-width:200px}.toggle-wrap{display:flex;align-items:center;gap:10px;margin-bottom:12px}.toggle-wrap:last-child{margin-bottom:0}.toggle-wrap label.toggle-label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.9em;color:#bbb;user-select:none}.toggle-switch{position:relative;width:44px;height:24px;background:#333;border-radius:12px;transition:background 0.25s;cursor:pointer;flex-shrink:0}.toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform 0.25s}.toggle-switch.on{background:var(--primary)}.toggle-switch.on::after{transform:translateX(20px)}.expire-select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:#0d0d1a;color:var(--text);font-size:0.88em;font-family:inherit;cursor:pointer}.expire-select:focus{outline:none;border-color:var(--primary)}.pwd-input{margin-top:10px}.generate-btn{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#7c6ff7,#5b4dcd);color:#fff;font-size:1.05em;font-weight:600;cursor:pointer;transition:all 0.25s;letter-spacing:1px;font-family:inherit}.generate-btn:hover{background:linear-gradient(135deg,#8b7df8,#6c5ee7);transform:translateY(-1px);box-shadow:0 8px 25px var(--primary-glow)}.generate-btn:active{transform:translateY(0)}.generate-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;box-shadow:none}.qr-result{text-align:center;margin-top:24px;display:none}.qr-result.show{display:block;animation:fadeIn 0.4s ease}.qr-result .qr-wrapper{display:inline-block;background:#fff;border-radius:16px;padding:16px;box-shadow:0 8px 30px rgba(108,92,231,0.25)}.qr-result .qr-meta{margin-top:14px;color:var(--muted);font-size:0.85em}.qr-result .qr-meta span{display:block;margin-top:4px}.download-btn{display:inline-block;margin-top:14px;padding:10px 28px;border:1px solid var(--primary);border-radius:10px;background:transparent;color:var(--primary);font-size:0.92em;cursor:pointer;transition:all 0.2s;font-family:inherit}.download-btn:hover{background:var(--primary);color:#fff}.status{font-size:0.84em;margin-top:8px}.status.success{color:var(--success)}.status.error{color:var(--danger)}footer{text-align:center;color:#444;font-size:0.78em;margin-top:30px;padding-bottom:20px}body.view-page{display:flex;align-items:center;justify-content:center}.view-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;max-width:600px;width:90%;text-align:center}.view-card h2{font-size:1.3em;margin-bottom:16px;color:#a78bfa}.view-card .content-area{background:#0d0d1a;border-radius:10px;padding:20px;text-align:left;white-space:pre-wrap;word-break:break-word;line-height:1.8;max-height:65vh;overflow-y:auto;font-size:0.95em}.view-card .content-area img{max-width:100%;border-radius:8px}.view-card .expired-msg{color:var(--danger);font-size:1.1em;padding:30px 0}.view-card .pwd-hint{color:var(--muted);font-size:0.85em;margin-top:10px}.view-card footer{margin-top:18px}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@media(max-width:480px){.options-row{flex-direction:column}.header h1{font-size:1.5em}}
</style>
</head>
<body>
<div class="container" id="generator">
<div class="header"><h1>二维码生成器</h1><div class="sub">文字 &amp; 图片 &middot; 密码保护 &middot; 时效控制</div></div>
<div class="tabs"><button class="tab active" data-mode="text">文字</button><button class="tab" data-mode="image">图片</button></div>
<div class="card mode-panel" id="panel-text"><label>输入文字内容</label><textarea id="textInput" placeholder="在这里输入您要分享的文字，扫码后就能看到..."></textarea></div>
<div class="card mode-panel" id="panel-image" style="display:none"><label>选择图片</label><div class="file-upload-area" id="uploadArea"><div class="upload-icon">&#x1F5BC;</div><div>点击上传图片</div><div class="hint">支持 JPG / PNG / GIF / WebP，最大 10MB</div><input type="file" id="imageInput" accept="image/*"></div><div id="uploadStatus" class="status" style="margin-top:10px;display:none"></div><img id="previewImg" class="preview-img" style="display:none"></div>
<div class="options-row">
<div class="card"><label style="margin-bottom:10px;">有效期</label><div class="toggle-wrap"><span class="toggle-label" style="cursor:pointer;user-select:none;" onclick="document.getElementById('expireToggle').click()"><span class="toggle-switch" id="expireToggleSwitch"></span>启用</span></div><select class="expire-select" id="expireDuration" style="display:none;"><option value="1">1 小时后过期</option><option value="6">6 小时后过期</option><option value="24" selected>24 小时后过期</option><option value="72">3 天后过期</option><option value="168">7 天后过期</option><option value="720">30 天后过期</option></select><input type="checkbox" id="expireToggle" style="display:none;"></div>
<div class="card"><label style="margin-bottom:10px;">访问密码</label><div class="toggle-wrap"><span class="toggle-label" style="cursor:pointer;user-select:none;" onclick="document.getElementById('pwdToggle').click()"><span class="toggle-switch" id="pwdToggleSwitch"></span>启用</span></div><input type="checkbox" id="pwdToggle" style="display:none;"><input type="password" id="pwdInput" class="pwd-input" placeholder="设置 4-20 位密码" style="display:none;" maxlength="20"></div>
</div>
<button class="generate-btn" id="generateBtn">生成二维码</button>
<div class="qr-result" id="qrResult"><div class="qr-wrapper"><div id="qrcode"></div></div><div id="expireHint" class="status success" style="display:none;margin-top:10px"></div><button class="download-btn" id="downloadBtn" style="display:none;">下载高清二维码 (PNG)</button></div>
<footer>&copy; Marvis 工具</footer>
</div>
<script>
let currentMode='text',currentQrCode=null,uploadedImageUrl=null,qrContentString='';
function bindToggle(a,b,c){let d=document.getElementById(a),e=document.getElementById(b),f=document.getElementById(c);function g(){e.classList.toggle('on',d.checked);if(f)f.style.display=d.checked?'':'none'}d.addEventListener('change',g);e.addEventListener('click',()=>{d.checked=!d.checked;g()});g()}
bindToggle('expireToggle','expireToggleSwitch','expireDuration');
bindToggle('pwdToggle','pwdToggleSwitch','pwdInput');
document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');currentMode=t.dataset.mode;document.querySelectorAll('.mode-panel').forEach(p=>p.style.display='none');document.getElementById('panel-'+currentMode).style.display='';document.getElementById('qrResult').classList.remove('show');document.getElementById('downloadBtn').style.display='none';if(currentQrCode){currentQrCode.clear();currentQrCode=null}})});
document.getElementById('uploadArea').addEventListener('click',()=>{document.getElementById('imageInput').click()});
document.getElementById('imageInput').addEventListener('change',async e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=ev=>{document.getElementById('previewImg').src=ev.target.result;document.getElementById('previewImg').style.display='block'};r.readAsDataURL(f);let s=document.getElementById('uploadStatus');s.style.display='block';s.textContent='上传中...';s.className='status';let fd=new FormData();fd.append('image',f);try{let resp=await fetch('https://api.imgur.com/3/image',{method:'POST',headers:{'Authorization':'Client-ID 546c25a59c58ad7'},body:fd});let data=await resp.json();if(data.success){uploadedImageUrl=data.data.link;s.textContent='上传成功';s.className='status success'}else{s.textContent='上传失败：'+(data.data?.error||'未知错误');s.className='status error';uploadedImageUrl=null}}catch(err){s.textContent='上传失败：网络错误，请重试';s.className='status error';uploadedImageUrl=null}});
function renderHighResQR(d,s){return new Promise(resolve=>{let t=document.createElement('div');t.style.position='absolute';t.style.left='-9999px';document.body.appendChild(t);new QRCode(t,{text:d,width:s,height:s,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});setTimeout(()=>{let c=t.querySelector('canvas');resolve(c);document.body.removeChild(t)},200)})}
function buildPayload(){let p={mode:currentMode};if(currentMode==='text')p.content=document.getElementById('textInput').value.trim();else p.content=uploadedImageUrl;if(document.getElementById('expireToggle').checked){let h=parseInt(document.getElementById('expireDuration').value);p.expire=Date.now()+h*3600*1000}if(document.getElementById('pwdToggle').checked){let w=document.getElementById('pwdInput').value.trim();if(!w||w.length<4)return{error:'密码至少 4 位'};p.pwd=sha256(w)}return p}
document.getElementById('generateBtn').addEventListener('click',async()=>{let r=document.getElementById('qrResult'),c=document.getElementById('qrcode'),d=document.getElementById('downloadBtn'),h=document.getElementById('expireHint');c.innerHTML='';if(currentQrCode){currentQrCode=null}d.style.display='none';h.style.display='none';if(currentMode==='text'){let t=document.getElementById('textInput').value.trim();if(!t){r.classList.add('show');c.innerHTML='<span style="color:#e74c3c;font-size:0.9em">请输入文字内容</span>';return}}else{if(!uploadedImageUrl){r.classList.add('show');c.innerHTML='<span style="color:#e74c3c;font-size:0.9em">请先上传图片</span>';return}}let p=buildPayload();if(p.error){r.classList.add('show');c.innerHTML='<span style="color:#e74c3c;font-size:0.9em">'+p.error+'</span>';return}let j=JSON.stringify(p),b=btoa(unescape(encodeURIComponent(j)));qrContentString=window.location.origin+window.location.pathname+'#d='+b;try{currentQrCode=new QRCode(c,{text:qrContentString,width:220,height:220,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});r.classList.add('show');if(p.expire){let ed=new Date(p.expire);h.textContent='有效期至：'+ed.toLocaleString('zh-CN');h.style.display='block'}d.style.display='inline-block'}catch(err){c.innerHTML='<span style="color:#e74c3c;font-size:0.9em">生成失败：'+err.message+'</span>';r.classList.add('show')}});
document.getElementById('downloadBtn').addEventListener('click',async()=>{if(!qrContentString)return;let b=document.getElementById('downloadBtn');b.textContent='生成中...';b.disabled=true;let c=await renderHighResQR(qrContentString,1024);c.toBlob(bl=>{let u=URL.createObjectURL(bl),a=document.createElement('a');a.href=u;a.download='qrcode_'+Date.now()+'.png';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);b.textContent='下载高清二维码 (PNG)';b.disabled=false},'image/png')});
function sha256(s){function r(v,a){return(v>>>a)|(v<<(32-a))}let m=Math.pow(2,32),l='length',i,j,res='',w=[],al=s[l]*8,h=[],k=[],pc=0,ic={};for(let c=2;pc<64;c++){if(!ic[c]){for(i=0;i<313;i+=c)ic[i]=c;h[pc]=(Math.pow(c,.5)*m)|0;k[pc++]=(Math.pow(c,1/3)*m)|0}}s+='\x80';while(s[l]%64-56)s+='\x00';for(i=0;i<s[l];i++){j=s.charCodeAt(i);if(j>>8)return'';w[i>>2]|=j<<((3-i)%4)*8}w[w[l]]=((al/m)|0);w[w[l]]=(al);for(j=0;j<w[l];){let bl=w.slice(j,j+=16),oh=h;h=h.slice(0,8);for(i=0;i<64;i++){let w15=bl[i-15],w2=bl[i-2],a=h[0],e=h[4],t1=h[7]+(r(e,6)^r(e,11)^r(e,25))+((e&h[5])^((~e)&h[6]))+k[i]+(bl[i]=(i<16)?bl[i]:(bl[i-16]+(r(w15,7)^r(w15,18)^(w15>>>3))+bl[i-7]+(r(w2,17)^r(w2,19)^(w2>>>10)))|0),t2=(r(a,2)^r(a,13)^r(a,22))+((a&h[1])^(a&h[2])^(h[1]&h[2]));h=[(t1+t2)|0].concat(h);h[4]=(h[4]+t1)|0}for(i=0;i<8;i++)h[i]=(h[i]+oh[i])|0}for(i=0;i<8;i++){for(j=3;j+1;j--){let b=(h[i]>>(j*8))&255;res+=((b<16)?0:'')+b.toString(16)}}return res}
(function ivp(){let h=window.location.hash;if(!h.startsWith('#d='))return;document.body.innerHTML='';document.body.className='view-page';let p;try{let b=h.slice(3);p=JSON.parse(decodeURIComponent(escape(atob(b))))}catch(e){showViewError('数据解析失败，二维码可能已损坏。');return}let u=new URLSearchParams(window.location.search);if(p.pwd&&!u.get('auth')){showPasswordGate(p);return}if(p.pwd&&u.get('auth')!==p.pwd){showViewError('密码验证失败，请重新扫码。');return}if(p.expire&&Date.now()>p.expire){showExpired();return}let c=document.createElement('div');c.className='view-card';let h2=document.createElement('h2');h2.textContent=p.mode==='text'?'扫码内容':'扫码图片';c.appendChild(h2);let ct=document.createElement('div');ct.className='content-area';if(p.mode==='text'){ct.textContent=p.content}else{let img=document.createElement('img');img.src=p.content;img.alt='图片';img.style.maxWidth='100%';img.style.borderRadius='8px';img.onerror=()=>{ct.textContent='图片加载失败，链接可能已失效。'};ct.style.textAlign='center';ct.appendChild(img)}c.appendChild(ct);let f=document.createElement('footer');f.style.cssText='margin-top:18px;color:#555;font-size:0.78em;';f.textContent='© Marvis 工具';c.appendChild(f);document.body.appendChild(c)})();
function showPasswordGate(pl){let c=document.createElement('div');c.className='view-card';let h2=document.createElement('h2');h2.textContent='请输入访问密码';c.appendChild(h2);let pi=document.createElement('input');pi.type='password';pi.placeholder='输入密码';pi.style.cssText='width:100%;max-width:280px;margin:12px auto;display:block;';pi.id='viewPwdInput';c.appendChild(pi);let b=document.createElement('button');b.textContent='验证';b.className='generate-btn';b.style.cssText='max-width:280px;margin:0 auto;display:block;';b.addEventListener('click',()=>{let i=document.getElementById('viewPwdInput').value;if(sha256(i)===pl.pwd){let b64=window.location.hash.slice(3);window.location.search='?auth='+sha256(i)}else{let h=c.querySelector('.pwd-hint')||document.createElement('div');h.className='pwd-hint';h.textContent='密码错误，请重试';h.style.color='#e74c3c';c.appendChild(h)}});c.appendChild(b);let f=document.createElement('footer');f.style.cssText='margin-top:18px;color:#555;font-size:0.78em;';f.textContent='© Marvis 工具';c.appendChild(f);document.body.appendChild(c);setTimeout(()=>pi.focus(),100)}
function showViewError(m){let c=document.createElement('div');c.className='view-card';let h2=document.createElement('h2');h2.textContent=m;h2.style.color='#e74c3c';c.appendChild(h2);document.body.appendChild(c)}
function showExpired(){let c=document.createElement('div');c.className='view-card';let h2=document.createElement('h2');h2.textContent='该二维码已过期';h2.style.color='#e74c3c';c.appendChild(h2);let p=document.createElement('p');p.style.cssText='color:#888;margin-top:12px;';p.textContent='请联系分享者重新生成二维码。';c.appendChild(p);document.body.appendChild(c)}
</script>
</body>
</html>
