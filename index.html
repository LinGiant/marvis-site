<script>

// ============ \u5168\u5c40\u72b6\u6001 ============

let contentItems = [];

let itemIdCounter = 0;

let titleText = '';

let qrContentString = '';



// ============ GITHUB_TOKEN ============

const GITHUB_TOKEN = 'YOUR_GITHUB_TOKEN_HERE';



// ============ GitHub 上传 ============

function base64Encode(uint8Array) {
  return new Promise((resolve) => {
    const batchSize = 1048576;
    let result = '';
    let offset = 0;
    function processBatch() {
      const end = Math.min(offset + batchSize, uint8Array.length);
      const batch = uint8Array.subarray(offset, end);
      const binary = String.fromCharCode.apply(null, Array.from(batch));
      result += btoa(binary);
      offset = end;
      if (offset < uint8Array.length) {
        setTimeout(processBatch, 0);
      } else {
        resolve(result);
      }
    }
    processBatch();
  });
}

async function uploadToGitHub(filename, uint8Array, onProgress) {

  const token = localStorage.getItem('gh_token') || GITHUB_TOKEN;

  if (onProgress) onProgress('encoding', 0);

  const base64 = await base64Encode(uint8Array);

  if (onProgress) onProgress('uploading', 0);

  const url = 'https://api.github.com/repos/LinGiant/marvis-site/contents/images/' + filename;

  const body = {

    message: 'Upload: ' + filename,

    content: base64,

    branch: 'main'

  };

  const bodyStr = JSON.stringify(body);



  return new Promise((resolve) => {

    const xhr = new XMLHttpRequest();

    xhr.open('PUT', url);

    xhr.setRequestHeader('Authorization', 'Bearer ' + token);

    xhr.setRequestHeader('Content-Type', 'application/json');

    xhr.setRequestHeader('Accept', 'application/vnd.github+json');



    xhr.upload.addEventListener('progress', (e) => {

      if (e.lengthComputable && onProgress) {

        onProgress('uploading', Math.round((e.loaded / e.total) * 100));

      }

    });



    xhr.onload = () => {

      if (xhr.status >= 200 && xhr.status < 300) {

        resolve({ ok: true, filename });

      } else {

        let msg = 'HTTP ' + xhr.status;

        try { msg = JSON.parse(xhr.responseText).message || msg; } catch {}

        resolve({ ok: false, msg, filename });

      }

    };

    xhr.onerror = () => resolve({ ok: false, msg: '网络错误', filename });

    xhr.send(bodyStr);

  });

}

// ============ AES-256-GCM \u52a0\u5bc6 ============

async function encryptImage(password, arrayBuffer) {

  const salt = crypto.getRandomValues(new Uint8Array(16));

  const enc = new TextEncoder();

  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);

  const key = await crypto.subtle.deriveKey(

    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },

    keyMaterial,

    { name: 'AES-GCM', length: 256 },

    false,

    ['encrypt']

  );

  const iv = crypto.getRandomValues(new Uint8Array(12));

  const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, arrayBuffer);

  const result = new Uint8Array(16 + 12 + ciphertext.byteLength);

  result.set(salt, 0);

  result.set(iv, 16);

  result.set(new Uint8Array(ciphertext), 28);

  return result;

}



// ============ AES-256-GCM \u89e3\u5bc6 ============

async function decryptImage(password, encryptedBuffer) {

  const salt = encryptedBuffer.slice(0, 16);

  const iv = encryptedBuffer.slice(16, 28);

  const ciphertext = encryptedBuffer.slice(28);

  const enc = new TextEncoder();

  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);

  const key = await crypto.subtle.deriveKey(

    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },

    keyMaterial,

    { name: 'AES-GCM', length: 256 },

    false,

    ['decrypt']

  );

  return await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);

}

function generateRandomPassword() {

  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';

  const arr = new Uint8Array(8);

  crypto.getRandomValues(arr);

  let pwd = '';

  for (let i = 0; i < 8; i++) {

    pwd += chars[arr[i] % chars.length];

  }

  return pwd;

}

document.getElementById('contentItemsContainer').addEventListener('change', async function(e) {

  if (!target) return;

  const itemId = parseInt(target.dataset.id);

  const item = contentItems.find(ci => ci.id === itemId);

  if (!item || !target.files || !target.files[0]) return;



  const file = target.files[0];



  // \u6e05\u7406\u65e7\u9884\u89c8

  if (item.previewUrl) {

    URL.revokeObjectURL(item.previewUrl);

  }



  try {

    const arrayBuffer = await new Promise((resolve, reject) => {

      const reader = new FileReader();

      reader.onload = () => resolve(reader.result);

      reader.onerror = reject;

      reader.readAsArrayBuffer(file);

    });



    item.imageData = arrayBuffer;

    item.imageFile = file;

    item.previewUrl = URL.createObjectURL(file);



    const dataSize = item.imageData.byteLength;
    const sizeMB = (dataSize / (1024 * 1024)).toFixed(1);
    item.imageInfo = '\u5f85\u52a0\u8f7d\u5c3a\u5bf8... \u00b7 ' + sizeMB + ' MB';

    // 加载精确尺寸
    const img = new Image();
    const finalSizeMB = sizeMB;
    img.onload = () => {
      item.imageInfo = img.width + '\u00d7' + img.height + ' \u00b7 ' + finalSizeMB + ' MB';
      const infoDiv = document.getElementById('imgInfo-' + item.id);
      if (infoDiv) infoDiv.textContent = item.imageInfo;
    };
    img.src = item.previewUrl;

    renderContentItem(item);

    rebindItemEvents(item);

  } catch (err) {

    item.imageData = null;

    item.imageFile = null;

  }

});

      return;

    }

  }



  // \u83b7\u53d6\u6709\u6548\u671f

  const expire = getExpireTimestamp();



  // \u6784\u5efa payload items

  const payloadItems = [];

  const uploadTasks = []; // { item, filename, uint8Array }



  for (const item of contentItems) {

    if (item.encryptionEnabled) {

      // \u52a0\u5bc6\u9879\uff1a\u751f\u6210 .enc \u6587\u4ef6

      const filename = crypto.randomUUID() + '.enc';

      let dataToEncrypt;



      if (item.type === 'text') {

        dataToEncrypt = new TextEncoder().encode(item.textContent).buffer;

      } else {

        dataToEncrypt = item.imageData;

      }



      const encrypted = await encryptImage(item.password, dataToEncrypt);

      payloadItems.push({ mode: item.type, file: filename });

      uploadTasks.push({ item, filename, uint8Array: encrypted });

    } else {

      // \u516c\u5f00\u9879

      if (item.type === 'text') {

        payloadItems.push({ mode: 'text', content: item.textContent });

      } else {

        // \u516c\u5f00\u56fe\u7247\uff1a\u4e0a\u4f20\u539f\u56fe

        const ext = item.imageFile ? (item.imageFile.name.split('.').pop() || 'png') : 'png';

        const filename = crypto.randomUUID() + '.' + ext;

        payloadItems.push({ mode: 'image', file: filename });

        uploadTasks.push({ item, filename, uint8Array: new Uint8Array(item.imageData) });

      }

    }

  }



  // \u6784\u5efa payload

  const payload = { items: payloadItems };

  if (titleText) payload.title = titleText;

  if (expire) payload.expire = expire;



  // \u751f\u6210\u4e8c\u7ef4\u7801

  const payloadJson = JSON.stringify(payload);

  const payloadBase64 = btoa(unescape(encodeURIComponent(payloadJson)));

  qrContentString = window.location.origin + window.location.pathname + '#d=' + payloadBase64;



  try {

    const qr = qrcode(0, 'L');

    qr.addData(qrContentString);

    qr.make();

    qrContainer.innerHTML = qr.createImgTag(4);

    resultDiv.classList.add('show');



    if (expire) {

      const expireDate = new Date(expire);

      expireHint.textContent = '\u6709\u6548\u671f\u81f3\uff1a' + expireDate.toLocaleString('zh-CN');

      expireHint.style.display = 'block';

    }



    downloadBtn.style.display = 'inline-block';



    // \u6267\u884c\u4e0a\u4f20\u4efb\u52a1

    if (uploadTasks.length > 0) {

      for (const task of uploadTasks) {

        const row = document.createElement('div');

        row.className = 'upload-detail-row';

        row.id = 'uploadRow-' + task.filename;

        row.innerHTML = '<span class="u-icon wait">\u23f3</span><span class="u-name">' + task.filename + '</span><span class="u-msg">\u4e0a\u4f20\u4e2d...</span>';

        detailList.appendChild(row);

      }



      for (const task of uploadTasks) {

        const row = document.getElementById('uploadRow-' + task.filename);

        const result = await uploadToGitHub(task.filename, task.uint8Array, (phase, pct) => {

          if (phase === 'encoding') {

            row.querySelector('.u-msg').textContent = '正在编码...';

          } else {

            row.querySelector('.u-msg').textContent = '上传中 ' + pct + '%';

          }

        });

        if (result.ok) {

          row.querySelector('.u-icon').className = 'u-icon ok';

          row.querySelector('.u-icon').textContent = '\u2713';

          row.querySelector('.u-msg').textContent = '\u4e0a\u4f20\u6210\u529f';

          row.querySelector('.u-msg').style.color = 'var(--success)';

        } else {

          row.querySelector('.u-icon').className = 'u-icon err';

          row.querySelector('.u-msg').textContent = result.msg;

          row.querySelector('.u-msg').style.color = 'var(--danger)';

function renderHighResQR(data, size) {

  return new Promise((resolve) => {

    const qr = qrcode(0, 'L');

    qr.addData(data);

    qr.make();

    const moduleCount = qr.getModuleCount();

    const cellSize = Math.floor(size / moduleCount);

    const dataUrl = qr.createDataURL(cellSize, 0);

    const img = new Image();

    img.onload = () => {

      const canvas = document.createElement('canvas');

      canvas.width = size;

      canvas.height = size;

      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#ffffff';

      ctx.fillRect(0, 0, size, size);

      ctx.drawImage(img, 0, 0, size, size);

      resolve(canvas);

    };

    img.src = dataUrl;

  });

}

  document.body.className = 'view-page';



  let payload;

  try {

    const base64 = hash.slice(3);

    payload = JSON.parse(decodeURIComponent(escape(atob(base64))));

  } catch (e) {

    showViewError('\u6570\u636e\u89e3\u6790\u5931\u8d25\uff0c\u4e8c\u7ef4\u7801\u53ef\u80fd\u5df2\u635f\u574f\u3002');

    return;

  }



  // \u68c0\u67e5\u8fc7\u671f

  if (payload.expire && Date.now() > payload.expire) {

    showExpired();

    return;

  }



  if (!payload.items || !Array.isArray(payload.items) || payload.items.length === 0) {

    showViewError('\u4e8c\u7ef4\u7801\u5185\u5bb9\u4e3a\u7a7a\u3002');

    return;

  }



  const publicItems = payload.items.filter(i => !i.file || !i.file.endsWith('.enc'));

  const encryptedItems = payload.items.filter(i => i.file && i.file.endsWith('.enc'));



  const card = document.createElement('div');

  card.className = 'view-card';



  // \u6807\u9898

  if (payload.title) {

    const titleEl = document.createElement('div');

    titleEl.className = 'view-title';

    titleEl.textContent = payload.title;

    card.appendChild(titleEl);

  }



  const contentArea = document.createElement('div');

  contentArea.className = 'content-area';

  card.appendChild(contentArea);



  // \u516c\u5f00\u5185\u5bb9

  if (publicItems.length > 0) {

    if (encryptedItems.length > 0) {

      const label = document.createElement('div');

      label.className = 'section-label';

      label.textContent = '--- \u516c\u5f00\u5185\u5bb9 ---';

      contentArea.appendChild(label);

    }



    for (const item of publicItems) {

      const section = document.createElement('div');

      section.className = 'public-section';

      if (item.mode === 'text' && item.content !== undefined) {

        const p = document.createElement('div');

        p.textContent = item.content;

        p.style.whiteSpace = 'pre-wrap';

        p.style.wordBreak = 'break-word';

        section.appendChild(p);

      } else if (item.mode === 'image' && item.file) {

        const wrapper = document.createElement('div');

        wrapper.style.cssText = 'position:relative;min-height:60px;';

        const loadingHint = document.createElement('div');

        loadingHint.textContent = '\u6b63\u5728\u4e0b\u8f7d\u56fe\u7247...';

        loadingHint.style.cssText = 'color:var(--muted);font-size:0.85em;text-align:center;padding:20px;';

        wrapper.appendChild(loadingHint);

        const img = document.createElement('img');

        img.alt = '\u56fe\u7247';

        img.style.maxWidth = '100%';

        img.style.borderRadius = '8px';

        img.style.display = 'none';

        wrapper.appendChild(img);

        section.appendChild(wrapper);

        // 异步 fetch 下载 + 分块进度 + 超时控制

        (async () => {

          const fileUrl = 'https://jolly-voice-78ed.2417611398.workers.dev/LinGiant/marvis-site/main/images/' + item.file;

          const controller = new AbortController();

          const timeoutId = setTimeout(() => controller.abort(), 120000);

          let blob;

          try {

            const resp = await fetch(fileUrl, { signal: controller.signal });

            clearTimeout(timeoutId);

            if (!resp.ok) throw new Error('HTTP ' + resp.status);

            // 尝试流式分块读取（支持进度显示）

            if (resp.body && typeof resp.body.getReader === 'function') {

              try {

                const contentLength = +resp.headers.get('Content-Length') || 0;

                const reader = resp.body.getReader();

                const chunks = [];

                let received = 0;

                while (true) {

                  const { done, value } = await reader.read();

                  if (done) break;

                  chunks.push(value.slice());

                  received += value.length;

                  if (contentLength > 0) {

                    const pct = Math.round((received / contentLength) * 100);

                    loadingHint.textContent = '\u6b63\u5728\u4e0b\u8f7d\u56fe\u7247... ' + pct + '%';

                  } else {

                    loadingHint.textContent = '\u6b63\u5728\u4e0b\u8f7d\u56fe\u7247... ' + (received / 1024 / 1024).toFixed(1) + 'MB';

                  }

                }

                blob = new Blob(chunks, { type: resp.headers.get('Content-Type') || 'image/png' });

              } catch (streamErr) {

                // 流式读取失败，重新请求获取完整文件
                loadingHint.textContent = '\u6b63\u5728\u4e0b\u8f7d\u56fe\u7247...';
                const resp2 = await fetch(fileUrl);
                if (!resp2.ok) throw new Error('HTTP ' + resp2.status);
                blob = await resp2.blob();

              }

            } else {

              // 浏览器不支持 ReadableStream，直接用 blob()
              blob = await resp.blob();

            }

            const blobUrl = URL.createObjectURL(blob);

            img.src = blobUrl;

            img.onload = function() { loadingHint.style.display = 'none'; img.style.display = ''; };

            img.onerror = function() { loadingHint.textContent = '\u56fe\u7247\u52a0\u8f7d\u5931\u8d25'; loadingHint.style.color = '#e74c3c'; };

          } catch (e) {

            clearTimeout(timeoutId);

            if (e.name === 'AbortError') {

              loadingHint.textContent = '\u4e0b\u8f7d\u8d85\u65f6\uff0c\u8bf7\u68c0\u67e5\u7f51\u7edc\u540e\u91cd\u8bd5';

            } else {

              loadingHint.textContent = '\u4e0b\u8f7d\u5931\u8d25\uff0c\u8bf7\u91cd\u8bd5';

            }

            loadingHint.style.color = '#e74c3c';

          }

        })();

      }

      contentArea.appendChild(section);

    }

  }



  // \u52a0\u5bc6\u5185\u5bb9

  if (encryptedItems.length > 0) {

    const divider = document.createElement('hr');

    divider.className = 'divider';

    contentArea.appendChild(divider);



    const sectionLabel = document.createElement('div');

    sectionLabel.className = 'section-label';

    sectionLabel.textContent = '--- \u52a0\u5bc6\u5185\u5bb9\uff08\u9700\u5bc6\u7801\u89e3\u5bc6\uff09 ---';

    contentArea.appendChild(sectionLabel);



    const pwdInput = document.createElement('input');

    pwdInput.type = 'password';

    pwdInput.placeholder = '\u8f93\u5165\u5bc6\u7801';

    pwdInput.style.cssText = 'width:100%;max-width:280px;margin:0 auto 8px;display:block;';

    pwdInput.id = 'viewPwdInput';

    contentArea.appendChild(pwdInput);



    const hint = document.createElement('div');

    hint.className = 'pwd-hint';

    hint.id = 'viewPwdHint';

    contentArea.appendChild(hint);



    const decryptedArea = document.createElement('div');

    decryptedArea.id = 'decryptedArea';

    contentArea.appendChild(decryptedArea);



    const btn = document.createElement('button');

    btn.textContent = '\u89e3\u5bc6';

    btn.className = 'generate-btn';

    btn.style.cssText = 'max-width:280px;margin:0 auto;display:block;';

    btn.addEventListener('click', async () => {

      const password = pwdInput.value;

      if (!password) {

        hint.textContent = '\u8bf7\u8f93\u5165\u5bc6\u7801';

        hint.style.color = '#e74c3c';

        return;

      }



      btn.disabled = true;

      btn.textContent = '解密中...';

      hint.textContent = '正在下载文件...';

      hint.style.color = 'var(--muted)';

      decryptedArea.innerHTML = '';



      let anySuccess = false;

      for (const item of encryptedItems) {

        try {

          const fileUrl = 'https://jolly-voice-78ed.2417611398.workers.dev/LinGiant/marvis-site/main/images/' + item.file;

          // 分块下载 + 进度显示 + 超时控制（带回退）

          const controller = new AbortController();

          const timeoutId = setTimeout(() => controller.abort(), 120000);

          let buffer;

          let downloadOk = false;

          try {

            const resp = await fetch(fileUrl, { signal: controller.signal });

            clearTimeout(timeoutId);

            if (!resp.ok) continue;

            // 尝试流式分块读取（支持进度显示）

            if (resp.body && typeof resp.body.getReader === 'function') {

              try {

                const contentLength = +resp.headers.get('Content-Length') || 0;

                const reader = resp.body.getReader();

                const chunks = [];

                let received = 0;

                while (true) {

                  const { done, value } = await reader.read();

                  if (done) break;

                  chunks.push(value.slice());

                  received += value.length;

                  if (contentLength > 0) {

                    const pct = Math.round((received / contentLength) * 100);

                    hint.textContent = '正在下载文件... ' + pct + '%';

                  } else {

                    hint.textContent = '正在下载文件... ' + (received / 1024 / 1024).toFixed(1) + 'MB';

                  }

                }

                // 合并所有分块

                const totalLength = chunks.reduce((acc, c) => acc + c.length, 0);

                buffer = new Uint8Array(totalLength);

                let offset = 0;

                for (const chunk of chunks) {

                  buffer.set(chunk, offset);

                  offset += chunk.length;

                }

                downloadOk = true;

              } catch (streamErr) {

                // 流式读取失败，回退到 arrayBuffer

              }

            }

            // 回退：全量 arrayBuffer（无进度显示但可靠）

            if (!downloadOk) {

              hint.textContent = '正在下载文件...';

              buffer = new Uint8Array(await resp.arrayBuffer());

              downloadOk = true;

            }

          } catch (e) {

            clearTimeout(timeoutId);

            if (e.name === 'AbortError') {

              hint.textContent = '下载超时，请检查网络后重试';

              hint.style.color = '#e74c3c';

            } else {

              hint.textContent = '下载失败，请重试';

              hint.style.color = '#e74c3c';

            }

            continue;

          }

          if (!downloadOk) continue;

          hint.textContent = '正在解密文件...';

          hint.style.color = 'var(--muted)';

          const decrypted = await decryptImage(password, buffer);



          anySuccess = true;

          const section = document.createElement('div');

          section.style.marginTop = '12px';



          if (item.mode === 'text') {

            const p = document.createElement('div');

            p.textContent = new TextDecoder().decode(decrypted);

            p.style.whiteSpace = 'pre-wrap';

            p.style.wordBreak = 'break-word';

            p.style.color = 'var(--text)';

            section.appendChild(p);

          } else {

            const blob = new Blob([decrypted]);

            const blobUrl = URL.createObjectURL(blob);

            const img = document.createElement('img');

            img.src = blobUrl;

            img.alt = '\u89e3\u5bc6\u540e\u7684\u56fe\u7247';

            img.style.maxWidth = '100%';

            img.style.borderRadius = '8px';

            section.appendChild(img);

          }

          decryptedArea.appendChild(section);

        } catch (e) {

          // \u89e3\u5bc6\u5931\u8d25\uff0c\u8df3\u8fc7\u8be5\u9879

        }

      }



      btn.disabled = false;

      btn.textContent = '\u89e3\u5bc6';

      if (anySuccess) {

        hint.textContent = '\u89e3\u5bc6\u6210\u529f';

        hint.style.color = 'var(--success)';

        pwdInput.style.display = 'none';

        btn.style.display = 'none';

      } else {

        hint.textContent = '\u5bc6\u7801\u9519\u8bef\uff0c\u8bf7\u91cd\u8bd5';

        hint.style.color = '#e74c3c';

      }

    });

    contentArea.appendChild(btn);

  }



  const footer = document.createElement('footer');

  footer.style.cssText = 'margin-top:18px;color:#555;font-size:0.78em;';

  footer.textContent = '\u00A9 Marvis \u5de5\u5177';

  card.appendChild(footer);



  document.body.appendChild(card);



  setTimeout(() => {

    const pwdInput = document.getElementById('viewPwdInput');

    if (pwdInput) pwdInput.focus();

  }, 100);

})();



function showViewError(msg) {

  const card = document.createElement('div');

  card.className = 'view-card';

  const h2 = document.createElement('h2');

  h2.textContent = msg;

  h2.style.color = '#e74c3c';

  card.appendChild(h2);

  document.body.appendChild(card);

}



function showExpired() {

  const card = document.createElement('div');

  card.className = 'view-card';

  const h2 = document.createElement('h2');

  h2.textContent = '\u8be5\u4e8c\u7ef4\u7801\u5df2\u8fc7\u671f';

  h2.style.color = '#e74c3c';

  card.appendChild(h2);

  const p = document.createElement('p');

  p.style.cssText = 'color:#888;margin-top:12px;';

  p.textContent = '\u8bf7\u8054\u7cfb\u5206\u4eab\u8005\u91cd\u65b0\u751f\u6210\u4e8c\u7ef4\u7801\u3002';

  card.appendChild(p);

  document.body.appendChild(card);

}



// ============ GitHub \u8bbe\u7f6e\u9762\u677f ============

function initGhSettings() {

  const settings = document.getElementById('ghSettings');

  const header = document.getElementById('ghSettingsHeader');

  const input = document.getElementById('ghTokenInput');

  const saveBtn = document.getElementById('ghSaveBtn');



  header.addEventListener('click', () => settings.classList.toggle('open'));



  // Restore saved token

  const saved = localStorage.getItem('gh_token');

  if (saved) input.value = saved;



  saveBtn.addEventListener('click', () => {

    const val = input.value.trim();

    if (val) {

      localStorage.setItem('gh_token', val);

      saveBtn.textContent = '\u2714 \u5df2\u4fdd\u5b58';

      saveBtn.classList.add('saved');

      setTimeout(() => { saveBtn.textContent = '\u4fdd\u5b58'; saveBtn.classList.remove('saved'); }, 2000);

    } else {

      localStorage.removeItem('gh_token');

      saveBtn.textContent = '\u2714 \u5df2\u6e05\u9664';

      saveBtn.classList.add('saved');

      setTimeout(() => { saveBtn.textContent = '\u4fdd\u5b58'; saveBtn.classList.remove('saved'); }, 2000);

    }

  });

}



// ============ \u521d\u59cb\u5316\uff1a\u9ed8\u8ba4\u6dfb\u52a0\u4e00\u4e2a\u5185\u5bb9\u9879 ============

initGhSettings();

addContentItem();

</script>
